  headline: |
    They Inoculated
    Against *Smallpox.*
  body: |
    Long before [Edward Jenner], inoculation against [smallpox] was a [universal] and highly successful practice across large parts of India. Indian physicians also attributed epidemic disease to imperceptible [animalculae] floating in the atmosphere — anticipating [germ theory] by nearly [two centuries] before Pasteur and Koch confirmed it in European laboratories.
  source: Dharampal, Indian Science and Technology in the Eighteenth Century
