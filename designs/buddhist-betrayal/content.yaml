- layout: closing
  headline: |2+

  body: |
    The pattern began at [Nerun]. It repeated at [Siwistan]. It would repeat again — at [Tarain], at [Vijayanagara], at every gate where a [priest], a [minister], or a [chieftain] chose the [short peace] over the [long defence]. The [priests] who welcomed [Qasim] believed they were saving their [temples]. They lost them the same day.
