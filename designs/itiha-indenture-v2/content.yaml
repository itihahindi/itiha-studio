  image_overlay: 1.2
  texture: halftone
- layout: split-story
  chapter: Chapter 02 · The Test
  headline: |
    The Only
    *Criterion.*
  quote: |
    The one and only determining criterion of revolutionary internationalism is — are you for or against the USSR.
  attribution: A. P. Vyshinsky · Voprosy Filosofii
  body: Goel argued that communism could not be defined by [Marxism], by [equality], or by [revolution].
    The Soviet jurist [Vyshinsky] had already defined it. So had [Stalin]. The test was [loyalty to Moscow],  measured,
    in Stalin's phrase, by readiness to defend the USSR _unconditionally, frankly and honestly_.
  image_bw: false
  quote_size: 50
  body_size: 49
  image: _cache/00d0d707b74a65e0.jpg
  image_overlay: 1.7
  block_y: middle
  texture: halftone
  headline_size: 100
  theme: dark
- layout: story
  chapter: Chapter 03 · The Confession
  headline: |
    What The General
    Secretary *Admitted.*
  body: "The popular image of communism was a movement of the poor. The [CPI's] own General Secretary\
    \ said otherwise. Writing in the _Cominform Journal_, [Ajoy Ghosh] confessed that the party's position\
    \ among the [working class],  & the [poor peasants]  the classes meant to be its granite foundation,\
    \ remained [extremely weak]. \nGoel's reading: the CPI drew its strength from the educated urban professional,\
    \ not the laboring villager.\n"
  image_overlay: 1
  block_y: bottom
  body_size: 45
  theme: dark
  headline_size: 79
  texture: halftone
- layout: story
  chapter: Chapter 04 · The Constitution
  headline: |
    In Their Own
    *Words.*
  quote: |
    The Communist Party of India, being a Section of the Communist International, is the most advanced organised detachment of the proletariat of India.
  attribution: CPI Constitution · 1934 Preamble
  body: Until [1943], the [CPI's own constitution] described the party as a [Section of the Communist
    International]. The clause was quietly dropped when the [Comintern] was formally dissolved that year
    by USSR, a dissolution designed, Goel writes, to please [America] and [Britain] then allied with the
    Soviet Union against Hitler. The constitution changed. The relationship did not.
  image: _cache/06e902a4ccb6184d.jpg
  image_overlay: 1.7
  image_bw: false
  block_y: bottom
  body_size: 48
  theme: dark
  texture: halftone
- layout: story
  chapter: Chapter 05 · The Three Prongs
  headline: |
    Open. Front.
    *Underground.*
  body: 'Goel described the CPI as a [three-pronged organisation]. The [open party] contested elections
    and published newspapers. The [front organisations]: _AITUC_, _Kisan Sabha_, _IPTA_, the _Progressive
    Writers'' Association_, the _Indo-Soviet Cultural Society_  politicised every non-political space.
    The [secret underground] worked inside the Army, the Police, and the policy-making organs, preparing
    for the final bid for power.'
  image_overlay: 1
  body_size: 46
  theme: dark
  texture: halftone
- layout: stat
  chapter: Chapter 06 · The Money
  headline: |
    Twenty Crores.
    Every *Year.*
  stats:
  - label: Goel's estimate of Soviet funding
    value: 20 cr
    sublabel: Annual flow into the CPI organisation
    value_red: true
  - label: Wholetimers maintained
