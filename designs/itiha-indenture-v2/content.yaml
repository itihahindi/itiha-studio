- layout: story
  headline: |
    A Section,
    Not A *Party.*
  body: |
    The argument of the pamphlet was not that [Indian communists] were foreign agents in disguise. It was that the [organisation] they belonged to had been built, funded, and directed from outside & that no amount of [Indian] vocabulary could change what it was. The name on the door read [Communist Party of India]. The address, Goel insisted, was [Moscow].
