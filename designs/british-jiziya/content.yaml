  chapter: Chapter 05 · The Palace And The Famine
  headline: |
    The *Bishop's* Palace
    The *Skeleton* Field.
  body: Between [1875] and [1900], an estimated [26 million] Indians died in colonial-era famines. Across
    the same years, the Ecclesiastical Charge funded the maintenance of the [Bishop of Calcutta's palace],
    the salaries of the Anglican [clergy], and the religious comfort of the [ruling class]. The famine
    relief budget was [withheld] on grounds of [fiscal prudence]. The Christian clergy's budget was [protected].
