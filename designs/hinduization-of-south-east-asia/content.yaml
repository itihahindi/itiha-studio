name: hinduisation-of-southeast-asia
format: instagram-portrait
caption: |
  Angkor Wat is the largest religious monument on Earth. It was built in the twelfth century by a Khmer king to honour Vishnu. Borobudur, on the island of Java, is the largest Buddhist stupa ever raised — its terraces map the cosmology of the Mahayana with a precision no Indian site has ever matched. The Ramayana is performed nightly in Bali, in shadow-play, in the original metres. Across a region the ancient texts called Suvarnabhumi — the Land of Gold — Indian civilisation took root, flourished, and built monuments larger than anything it built at home. The most extraordinary fact about this expansion is that it happened without an army.

  This carousel draws on the foundational work of R.C. Majumdar's _Ancient Indian Colonisation in South-East Asia_, which documents the process he called "Hinduisation." Beginning around the start of the Christian Era, Indian merchants sailed from Tamralipti in Bengal, Gopalpur in Orissa, Masulipatam, and Broach, braving the Bay of Bengal and the Straits of Malacca to reach Suvarnabhumi. They were followed by Brahmin and Buddhist missionaries, by Kshatriya adventurers, by craftsmen and scholars. They married local women. They taught Sanskrit. They translated the Ramayana and the Mahabharata into Old Javanese, Khmer, and Cham. Kings adopted the Arthashastra and the Manu-Samhita as the basis of statecraft. The chaturvarna was introduced and modified for local conditions. A Brahmin named Kaundinya arrived in Cambodia on a trading vessel, married the queen Lieu-ye, and founded Fu-nan — the first Hindu kingdom in Southeast Asia. By the time European explorers arrived, the region's architecture, language, religion, and political theory were Indian. No conquest. No expulsion. No empire in the Roman sense. Just merchants, monks, and a thousand years of patient cultural transmission.

  The Hinduisation of Southeast Asia is the great counter-example to every theory of civilisational expansion built on conquest. It is what cultural influence looks like when it earns its place.

  @itiha29 · itiha.info
