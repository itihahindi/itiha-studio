- layout: timeline
  chapter: Chapter 02 · The Sequence
  headline: |
    A Hundred Years
    Of *Plunder.*
  items:
  - date: '1025'
    headline: '*Somnath* sacked'
    body: Mahmud of Ghazni razes the temple; the central lingam is shipped to [Ghazni].
  - date: '1175'
    headline: '*Multan* annexed'
    body: Ghurid expansion begins. The northwest frontier becomes a permanent corridor.
  - date: '1192'
    headline: '*Tarain* — second battle'
    body: Prithviraj defeated. The Delhi Sultanate is two years away from its founding charter.
- layout: did-you-know
  headline: |
    The First Printing
    Press In India
    Arrived In *1556.*
  body: |
    It came with [Jesuit] priests at the [Portuguese] mission in Goa and printed a Tamil-language _Cartilha_ — Europe's
    moveable type reached the subcontinent within a [century] of Gutenberg.
  source: A. K. Priolkar · The Printing Press In India
