name: seventy-twenty-ten
format: instagram-portrait
caption: |
  October 1937. Japanese armies were burning their way through China. Mao Zedong issued an order to the Eighth Route Army.

  Seventy percent expansion. Twenty percent dealing with the Kuomintang. Ten percent resisting Japan.

  A 9-part read on the directive that rewrote a war — and the arithmetic that has governed every communist "united front" since.

  @itiha29 · itiha.info

  #IndianHistory #ColdWar #Itiha
