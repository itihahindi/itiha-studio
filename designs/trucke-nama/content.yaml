    The Brahmins
    Made Him *Do It.*
  body: |
    To absolve Aurangzeb of [religious bigotry], Truschke argues that the temples were destroyed because they had become [centres of sedition]  [deviant Brahmins] teaching [depraved knowledge] to ordinary Hindus. The evidence she provides for any such [imperial investigation] is [zero]. The thesis is [conjectural]. Victim-blaming, presented as research.
