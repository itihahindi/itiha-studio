name: indian-science-before-the-british
format: instagram-portrait
caption: |
  In 1750, India and China together produced 73% of the world's industrial output. Seventy years later, the share had collapsed. The textbook explanation — that India was a backward agrarian society awaiting British modernisation — is the version the East India Company wrote about itself. The version preserved in the Company's own surveyors' reports tells a different story.

  This carousel draws on Dharampal's _Indian Science and Technology in the Eighteenth Century_, a book assembled almost entirely from British colonial archives — the dispatches, surveys, and Royal Society papers the British wrote about what they actually found on the subcontinent. The findings: 10,000 iron and steel furnaces producing _wootz_ steel that British metallurgists conceded was superior to Sheffield's best, and produced in 2.5 hours against Britain's 4. Universal smallpox inoculation, decades before Edward Jenner. Practitioners who attributed epidemic disease to imperceptible "animalculae" in the atmosphere — germ theory, two centuries before Pasteur. Ice manufactured in the Indian plains without freezing temperatures, using porous clay pans and evaporative cooling. The seed drill, in continuous Indian use long before Jethro Tull's English version. Astronomical tables at Benares accurate back to 3102 BC. By the 1820s, all of it had been pulverised by Company taxation and trade policy.

  Dharampal's archive is the rebuttal to the colonial myth, written in the coloniser's own hand.

  @itiha29 · itiha.info
