- layout: split-story
  chapter: Fact 02 · The Cellular Jail
  headline: |
    Poetry Written
    In *Thorns.*
  body: When the British denied him pen and paper at [Kala Pani], Savarkar wrote [thousands of lines]
    of poetry on the [whitewashed walls] of his cell, using [thorns] and [stones] as a stylus. He committed
    every verse to memory before the [guards] could whitewash the walls clean. The poems survived in his
    head, not in the prison.
  image: _cache/a74c44587ae3412c.webp
  image_overlay: 1
  body_size: 45
