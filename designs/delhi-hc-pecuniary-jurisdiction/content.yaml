name: delhi-hc-pecuniary-jurisdiction
brand: vaq-hq
format: instagram-portrait
caption: |
  Delhi's High Court lawyers struck for three days over a single number.

  The Delhi High Court is one of a handful in India with an Original Side. Civil suits
  worth more than 2 crore are filed there directly, not in a district court. In July 2026
  the Court's Full Court recommended raising the district courts' ceiling to 10 crore,
  which would push everything below that figure out of the High Court. The Delhi High
  Court Bar Association says nearly 70% of its Original Side docket would go. That figure
  is the Bar's own, and no official breakdown has been published.

  The Bar abstained from work on 14, 15 and 16 July, after a Division Bench refused on 10
  July to stop the judges' committee from tabling its report. Senior Advocate J. Sai
  Deepak, one of six senior lawyers quoted by Bar & Bench, said the change would tell
  people that only those with deeper pockets can access the better services of the Delhi
  High Court, and called it an elitism that could be avoided. He proposed a 5 crore
  threshold instead, or a cap on court fees between 3 lakh and 5 lakh.

  Two things are worth knowing. The High Court cannot do this itself. The limit sits in
  Section 5(2) of the Delhi High Court Act, 1966, and only Parliament can change it,
  exactly as it did in 2015 when it raised the figure from 20 lakh to 2 crore. And 10
  crore is not the end of it. The district court bar associations asked the Law Ministry
  for 20 crore in May 2025. They have called 10 crore a first step and want 20 crore or
  unlimited jurisdiction.

  The Bar suspended its strike on 16 July after meeting Arjun Ram Meghwal, the Minister of
  State for Law and Justice, and attending a meeting called by Chief Justice Devendra
  Kumar Upadhyaya. Suspended, not withdrawn. The writ petitions are listed for 24 July.

  Photos: Ishanjyotibora (CC BY), Ramesh Lalwani (CC BY-SA) and Rijksmuseum (CC0) via
  Wikimedia Commons. Meghwal portrait: PIB / Ministry of Law and Justice (GODL-India).

