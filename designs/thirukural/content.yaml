- layout: split-story
  chapter: Chapter 04 · The 1969 Book
  headline: |
    The Hindu Convert
    Who Sealed The *Lie.*
  body: 'In [1969], a Hindu convert to Christianity named [M. Deivanayagam] published a Tamil book titled
    [Was Thiruvalluvar a Christian?]. Its central claim went further than Pope''s: that the Apostle [St.
    Thomas] had [personally met] and [personally converted] Thiruvalluvar. There is no historical evidence
    the two men were even contemporaries. The book sold on the assertion alone.'
