  chapter: Chapter 01 · The Scholar From Banaras
  headline: |
    The Pandit Who
    Travelled *South.*
  body: 'The esteemed scholar [Gagabhatt] travelled from [Banaras] to Raigad with a single argument: the
    Maratha king must formally ascend the throne and become a [Chhatrapati], a [sovereign king] in full
    Vedic right. Preparations began [months] in advance. A magnificent [throne] was commissioned, adorned
    with [gold] and [jewels]. Brahmins were summoned from across India, to be rewarded with [elephants],
    [horses], and money.'
  headline_size: 75
