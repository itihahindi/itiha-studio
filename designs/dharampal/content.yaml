  body: The technologies did not [fade]. They were [dismantled] — by [exorbitant taxation], by [trade
    policy] written in [London], and by the systematic [breaking] of the Indian artisan. The collapse
    from [24.5%] to [1.7%] is the most rapid deindustrialisation in recorded history.
