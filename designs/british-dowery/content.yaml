  headline: |
    Land Belonged
    To The *Many.*
  body: Across pre-colonial India, land was held in forms of [communal ownership]. Different groups held
    [different rights] to the same field the cultivator, the village, the lineage, the lord. Land was
    not strictly [private property]. Taxation was [flexible], adjusted to the harvest. The structure that
    would later [crush] the peasant did not yet [exist].
  body_size: 45
