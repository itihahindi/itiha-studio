  chapter: Chapter 01 · A Tragic Loss
  headline: |
    Motherless
    At *Two.*
  body: |
    Sambhaji was born on [14 May 1657]. He lost his mother, Queen [Saibai], when he was just [two] years old.
      Other royal children were raised with care. He grew up in a [kingdom] always at war — his father away on the battlefield, fighting just to keep [Swarajya] alive.
  body_size: 47
