- layout: split-story
  chapter: Chapter 04 · The Moment
  headline: |
    Seventy-Two Minutes
    Before *Sunrise.*
  body: On [6 June 1674], at the most auspicious moment the [Rajabhishekaprayoga] could calculate , [three
    Ghatikas], or [seventy-two minutes] before sunrise, Shivaji ascended the throne. He took the title
    [Kshatriya-Kulawatansa Shri Raja Shivachhatrapati]. He embarked on a [chariot ride], the [Ratharohan],
    and rode an [elephant] to a local temple. A [new calendar era] began from that hour.
