name: pragati-noida-2026
brand: vaq-hq
format: instagram-portrait
caption: |
  Uttar Pradesh has approved a plan to build a robotics and AI park in Noida.

  The project is called PRAGATI, short for Park for Robotics, Artificial Intelligence, GPU
  Clusters and Advanced Technical Innovation. Chief Minister Yogi Adityanath cleared it at
  a review meeting of the state IT and Electronics Department on July 16. It is planned
  across about 75 acres and would house robotics testing, rapid prototyping, GPU clusters,
  AI compute and physical-AI data centres.

  The state bills it as India's first integrated robotics and advanced manufacturing
  cluster and projects over one lakh direct and indirect jobs, plus more than Rs 2,000
  crore in gross value added over five years. Those are government projections. No land
  has been developed and no construction has begun.

  The same roadmap sets aside Rs 100 crore in the FY27 budget for two deep-tech U Hubs, in
  Noida and Lucknow, covering quantum computing, semiconductor design and physical AI. All
  of it traces to a single state government announcement.

  File photos: S211897polito, PiDatacenters and Divyendu Raj Sharma via Wikimedia Commons,
  CC BY-SA.

