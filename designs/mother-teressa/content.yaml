- layout: closing
  headline: |
    Canonised By
    *Rome.* Indicted
    By The Record.
  body: |
    The [Vatican] declared her a saint in [2016]. The volunteers, the auditors, the dying she presided over — they wrote a different verdict. In [Calcutta], her name is no longer [unquestioned].
