- layout: split-story
  chapter: Chapter 02 · The Sanskrit Drama
  headline: |
    A Play Performed
    In The *Temple.*
  body: |
    Around [1210–15 CE], the royal preceptor [Madana] composed a Sanskrit drama called the _Pārijātamañjarī_. The text states plainly that the play was performed in the [Sarasvati] temple at Dharanagara.
    The drama calls the building _Bhāratī bhavana_ the hall of Bhāratī  & _Śāradā sadman_, the abode of Śāradā. Both are names of [Sarasvati]. Two inscribed slabs of this text were found inside the [Bhojshala] complex itself, one of them behind the [mihrab].
  body_size: 45
