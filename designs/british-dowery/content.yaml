  headline: |
    Suddenly The Bride
    Was *Cash.*
  body: |
    As peasants fell into [massive debt] to save their ancestral land from the auctioneer, [dowry] became a [coveted financial prize] — as valuable to the groom's family as any inherited [right in land]. The voluntary gift evaporated. In its place came [dreaded payments on demand], grasped with [tenacity] even when wedding and funeral expenses were cut.
  source: Arvind Sharma, The Ruler's Gaze
