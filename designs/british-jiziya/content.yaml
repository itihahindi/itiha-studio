  headline: |
    Even Indian Christians
    Were *Excluded.*
  body: |
    Roughly [three million] Indian Christians lived under the Raj, most of them [Syrian Christians] of [Travancore], whose tradition predated the British arrival by over [a thousand years]. They received [nothing] from the Ecclesiastical Charge. British administrators officially declared the Syrian faith [heretical]. The state-church was not a service for [Christians in India]. It was a restricted benefit for the [White Sahibs].
