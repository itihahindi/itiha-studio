  headline: did-you-know
  body: |
    In Marathi Savarkar coined the words [digdarshak] (director), [chitrapat] (movie), and [chhayachitran] (photography) — suggesting them as replacements for the [English] and [Urdu] terms then in use. Every Hindi and Marathi film credit roll still carries his vocabulary. The revolutionary was also a [linguist].
  body_size: 50
  headline_offset_y: -90
  body_offset_y: 120
  source: 'Vikram Sampath, Savarkar: A Contested Legacy'
  theme: light
  texture: halftone
- layout: split-story
  chapter: Fact 06 · The Women's Wing
  headline: |
    Strong Bodies,
    Sharp *Minds.*
  body: Savarkar argued that women must be [physically strong], [mentally alert], and [politically aware]
    for the nation to rise. At [Nashik] he helped form the [Atmanishtha Yuvati Sangha], where women debated
    politics and organised for the [swadeshi] movement. He pushed for girls' education from the [youngest]
    age, and asked them to serve the [motherland] when called.
  image: _cache/3f71dd25b53b13bb.jpg
  image_overlay: 1.4
  body_size: 45
  body_y: 38
- layout: split-story
  chapter: Fact 07 · Savarkar Sadan, 1940
  headline: |
    The Meeting That
    Seeded The *INA.*
  body: '[Subhas Chandra Bose] arrived at Savarkar Sadan in [Bombay] for a [three-hour] conversation.
    Savarkar''s advice was specific: leave [India], reach [Germany] and [Japan], raise an armed force
    from Indian [prisoners of war] held abroad. Bose followed the route exactly. The [Indian National
    Army] is the answer to that meeting.'
  image: _cache/84a5a2377f274820.jpg
  image_position: 45% 50%
  body_size: 50
