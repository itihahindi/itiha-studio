name: ins-mahendragiri
brand: vaq-hq
format: instagram-portrait
caption: |
  Defence Minister Rajnath Singh commissioned INS Mahendragiri into the Indian Navy at Mumbai — the seventh and final stealth frigate of Project 17A (the Nilgiri class).

  Built by Mazagon Dock Shipbuilders, the 6,670-tonne warship is designed almost entirely in India by the Navy's Warship Design Bureau. It carries 8 BrahMos supersonic cruise missiles, 32 Barak-8 air-defence missiles, a 76mm main gun and anti-submarine torpedoes, and hits 28 knots. Enhanced stealth shaping keeps its radar signature low. Named after a peak in the Eastern Ghats, Mahendragiri closes out one of India's most ambitious indigenous warship programmes.
