caption: |2
   — to construct what its proponents now openly call "Dravidian Christianity."

  This carousel documents the five components of the strategy. First, the inversion of Indian history through Caldwell's Aryan-Dravidian race theory. Second, the fabrication of the St. Thomas myth — the historically baseless claim that the Apostle Thomas visited South India in 52 CE and personally converted the Tamil sage Thiruvalluvar, formalised in evangelical training manuals that declare "India is a Thomas-Dravidian Christian Nation." Third, the digestion of Tamil classics — G.U. Pope's nineteenth-century claim that the Thirukural is an echo of the Sermon on the Mount, the projection of Saiva Siddhanta as a stepping-stone monotheism approximating Christianity, and the assertion that ancient Tamil bridal mysticism was derived from the Song of Solomon. Fourth, the appropriation of Hindu art — Catholic priests inventing "Christian mudras" for Bharatanatyam, and Dravidian Christian propagandists reinterpreting the Somaskanda sculpture as a revelation of the Trinity. Fifth, the weaponisation of the Dravidian-Dalit identity by the Lutheran World Federation, the World Council of Churches, and the Dalit Freedom Network — lobbying the UN, EU, and US government to equate the Indian caste system with racial apartheid, and justify international intervention in India's domestic affairs.

  Dravidian Christianity is not a religion. It is a five-part method for detaching a civilisation from itself. The method is visible. The specific institutions running it are named in the record.

