  headline: |
    The Conference That
    Made It *Doctrine.*
  body: |
    At a 2005 conference in [New York] titled "History of Early Christianity in India," souvenir materials were distributed showing colour images of [Thiruvalluvar] sitting in [rapt attention] before St. Thomas. When the [Catholic Church] later planned a mega-budget feature film about Thomas, its scriptwriter cited Deivanayagam's [PhD dissertation] , controversially accepted by [Madras University]  as "evidence" that the two had met.
  source: Rajiv Malhotra, on the digestion of Tamil tradition
