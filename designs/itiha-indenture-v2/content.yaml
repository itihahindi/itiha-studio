name: no-communist-party-of-india
format: instagram-portrait
caption: |
  In 1954, a pamphlet asked a simple question — was the Communist Party of India actually Indian?

  Sita Ram Goel's answer: there was no such party. Only a Soviet section operating under an Indian name.

  A 9-part read on what the CPI's own constitution said, what Stalin demanded, and what Ajoy Ghosh admitted.

  @itiha29 · itiha.info

  #IndianHistory #ColdWar #Itiha
