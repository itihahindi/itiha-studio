caption: |
  The ceasefire just met its hardest test.

  CENTCOM began what it calls a series of powerful strikes on Iran on Tuesday. The trigger: Iranian attacks on three commercial ships in the Strait of Hormuz. Washington calls it a clear violation of the ceasefire.

  The June memorandum ended the war and reopened the strait. It now has to survive this. Earlier in the day, the US also revoked Iran's oil sales authorization. Oil futures jumped. Trump is in Ankara for the NATO summit, one border away from Iran.

  One of the world's most critical oil chokepoints is back in play. Watch it.

  Source: CNBC.

