  chapter: Fact 04 · The Banned Book
  headline: |
    The Book For The
    *Revolutionaries.*
  body: _The Indian War of Independence of 1857_ was banned by the British before it was even printed.
    For [three decades] it served as the [veritable Bible] of the underground. Both [Bhagat Singh] and
    [Subhas Chandra Bose] secretly republished it — the only Indian historical work both men reissued
    by their own hand.
  image: _cache/efdecebec04e5a9c.jpg
  image_filter: archival
  image_overlay: 1.7
  body_size: 50
  body_y: 31
