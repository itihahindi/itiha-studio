  chapter: Chapter 04 · The Moneylender's Door
  headline: |
    Borrow Or Lose
    The *Land.*
  body: To meet the fixed [revenue demand], cultivators were forced to the [moneylender's] door. Under
    the new colonial [legal arrangement], the moneylender was empowered to [seize] and [auction] the peasant's
    land if the debt was not paid. The British had created the perfect [trap]  a tax that could not be
    missed, a [credit] system that could not be escaped, and a [court] that enforced the seizure.
  body_size: 45
  body_y: 47
