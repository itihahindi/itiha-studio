  image_filter: archival
  texture: halftone
  theme: dark
- layout: split-story
  headline: |
    The Temple Where The
    *Dalit* Was Priest.
  body: |
    At [Ratnagiri], Savarkar built the [Patit Pavan Mandir]  "Saviour of the Downtrodden"  open to [all castes]. He appointed a man from the [scavenger] community to officiate as priest, [decades] before the Constitution outlawed untouchability. He was a [rationalist] who built temples to break them open.
  image: _cache/7e19bb37f2050378.jpg
  image_filter: sepia
  image_overlay: 1.4
