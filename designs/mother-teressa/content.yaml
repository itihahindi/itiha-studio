    A *Saint.*
  items:
  - number: 1
    headline: The global anti-contraception tour
    body: She lobbied [worldwide] against the legality of [contraception] and [divorce]
  - number: 2
    headline: The Contras and the death squads
    body: 'She supported the [Nicaraguan Contras], a faction that unleashed [death squads] in its attempt
      to seize the country. '
  - number: 3
    headline: 500 convents, one name
    body: Every one of her [500 convents] across the world bears her order's name. The vow of [humility]
      applied to the patients, not the founder.
