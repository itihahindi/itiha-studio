name: the-buddhist-betrayals-at-nerun
format: instagram-portrait
caption: |
  When Muhammad bin Qasim's Arab army marched from Debal toward the interior of Sindh in 712 CE, the city of Nerun opened its gates before the invaders arrived. The gates were opened not by the city's rulers but by its Buddhist priests — who, according to the historical record, had been in treasonable correspondence with al-Hajjaj, the Umayyad governor at Basra, long before Qasim's fleet ever reached the Sindhi coast. This carousel documents one of the earliest recorded instances of internal betrayal in the history of Islamic invasions of India, and the pattern it established.

  This account draws on Sandeep Balakrishna's _Invaders and Infidels: From Sindh to Delhi: The 500-Year Journey of Islamic Invasions_. After the bestial horror inflicted on Debal, whose defenders had fought to the death, the leadership at Nerun — near modern-day Hyderabad in Pakistan — chose a different path. Two Buddhist priests were dispatched to meet Qasim with an appeal for peace, handing the city over without a single arrow being fired. The collaboration went beyond surrender. The Buddhist leadership supplied ample provisions to the Arab army and offered active assistance for the onward campaign into the heart of Sindh. The pattern repeated at Siwistan, where Buddhist fifth-columnists similarly welcomed the Arabs and entered into a pact with them to overthrow their own governor. The compromise saved nothing. Qasim followed a policy of iconoclasm at Nerun regardless — idols were broken, and mosques were founded upon the ruins of the existing temples.

  The gates that opened for Qasim at Nerun would open for other invaders in the centuries that followed. Balakrishna's argument is that the pattern begins here — at the Buddhist welcome, on the road out of Debal.

  @itiha29 · itiha.info
