- layout: split-story
  chapter: Chapter 03 · The Impossible Trade
  headline: |
    Ice From A
    *Tropical* Plain.
  body: In the plains of northern India, where the air never froze, ice was manufactured every winter.
    Boiled water was poured into shallow [unglazed clay] pans set over beds of [dry straw] in insulated
    pits. On clear, still nights, rapid [evaporation] drew enough heat from the water to trigger [congelation].
    The British, watching, could not at first believe what they were seeing.
  body_size: 44
  texture: halftone
- layout: split-story
  chapter: Chapter 04 · The Field
  headline: |
    The Seed Drill,
    *Time Immemorial.*
  body: The [drill plough] , a device that dropped seed into evenly spaced rows, was in continuous use
    across India from [time immemorial]. It was simple, efficient, and saved both [seed] and [labour].
    Europe began to adopt the same technology only in the [late eighteenth century], after [Jethro Tull's]
    version became known. The Indian cultivator had been using it for [centuries].
  body_size: 47
  body_y: 60
  texture: halftone
- layout: did-you-know
  eyebrow: Chapter 05 · The Sky
  theme: dark
  headline: |
    Planetary Tables To
    *3102 BC.*
  body: |
    At the [Man Mandir] observatory in [Benares] and at [Jaipur], stone instruments tracked the sky with precision that astonished visiting European scientists. When eighteenth-century French and British astronomers analysed the Indian tables, they found the planetary positions had been calculated accurately back to [3102 BC] , the year the Indian astronomers marked as the start of the [Kali Yuga].
  source: Dharampal, Indian Science and Technology in the Eighteenth Century
