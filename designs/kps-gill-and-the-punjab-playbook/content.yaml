name: kps-gill-and-the-punjab-playbook
brand: itiha
format: instagram-portrait
caption: |
  Between 1988 and 1995, the Punjab Police under K.P.S. Gill dismantled the Khalistan insurgency — one of the most heavily armed, cross-border-funded militancies in modern Indian history. The playbook that broke it was not the frontal assault that had failed in 1984. It was a patient, intelligence-driven, ground-up counter-insurgency that would later be studied in police academies from Kashmir to Chhattisgarh.

  This carousel documents the six operational strategies that turned the tide. Operation Black Thunder II in May 1988 saw Gill lead a coordinated siege of the Golden Temple complex — cordoning the shrine, using elite snipers, cutting off supplies, and forcing the militants to surrender in full view of the international media. Operation Night Dominance reversed the militants' traditional control of the rural countryside after dark by mandating aggressive night patrols, ambushes, and focal-point deception. The Punjab Police initiated a massive intelligence overhaul to map the militants' cross-border infiltration and exfiltration routes into Pakistan. Tens of thousands of Special Police Officers — armed civilian youths — were deployed at the village level to provide micro-level intelligence. Captured or surrendered militants were co-opted as Covert Apprehension Techniques — the "CATs" — who worked with police tactical teams to identify active militants and inject paranoia into the insurgent networks. And joint interrogation teams comprising the Punjab Police and the CRPF ended the coordination failures that had plagued earlier operations, allowing state and central forces to operate cohesively as a single unit.

  The Punjab model is now the reference point for every subsequent Indian counter-insurgency. Its architect knew that the war was won by intelligence at the village level, not by artillery at the shrine.

