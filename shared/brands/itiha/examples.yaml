# ITIHA — worked examples. Reference for layout selection + exact field shapes.
# Upload as Project Knowledge in claude.ai. The main instructions tell Claude
# WHAT to produce; this file shows HOW each layout's fields are structured.
#
# Layout picker (use the layout whose row fits the argument):
#
#   cover         → opening slide. Eyebrow, Eyebrow-Meta, Headline, Subline, Swipe-Meta.
#   story         → narrative beat. Chapter, Headline, Body.
#   split-story   → image-left text-right (or vice versa). story fields + Image.
#   quote         → pull quote. Quote, Attribution.
#   stat          → numeric punch. Stats array of { Label, Value, Value-Red?, Sublabel }.
#   numbered-list → "N reasons / N truths". Items array of { Number?, Headline, Body }.
#   comparison    → Myth vs Reality / Claim vs Counter. Left-/Right- fields.
#   portrait      → biographical subject. Name, Dates, Role, Quote?, Attribution?, Image.
#   timeline      → chronological progression (regnal years, conquest dates). Items array of { Date, Headline, Body }. 3-6 events.
#   map           → geographic story (raid route, empire extent). Image (map), Markers array of { X, Y, Label, Sublabel } where X/Y are percentages 0=left/top, 100=right/bottom.
#   did-you-know  → surprising-fact breather. Eyebrow (defaults "Did You Know?"), Headline, Body, Source?. 1 per carousel max.
#   pie-chart     → proportions / shares. Segments array of { Label, Value }. Optional Center-Label for donut. 2-6 segments.
#   line-graph    → trend over time (exports, casualties across years). Points array of { Label, Value } left to right. Y-Suffix?. 4-8 points. For TWO trends compared: Series array of { Label, Points }.
#   bar-chart     → compare a value across categories. Bars array of { Label, Value }. Set Horizontal: true for ranked rows when labels are long. 2-7 bars.
#   dynasty       → succession / genealogy tree (Mughal emperors, Maratha Peshwas). Nodes array of { Name, Dates, Note?, Generation?, Highlight? }. Same Generation puts rival siblings on one row.
#   before-after  → two images split diagonally (ruins vs reconstruction, 1900 vs now). Image-Before, Image-After, Label-Before, Label-After. Optional Filter-Before / Filter-After.
#   document      → primary source (manuscript, treaty, inscription). Image (scan), Quote, Translation?, Attribution.
#   annotated     → close-reading of a painting or photo. Image, Callouts array of { X, Y, Label } where X/Y are percentages. 2-5 callouts.
#   sources       → bibliography slide near the end. Sources array of { Title, Author, Detail }.
#   closing       → final slide. Headline, Body, Handle.
#   cta-red       → red action-prompt slide. Headline, Subline?.


