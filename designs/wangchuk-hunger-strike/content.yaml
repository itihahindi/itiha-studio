  headline: Nineteen Days At *Jantar Mantar*
  body: |
    [Sonam Wangchuk], 59 — the engineer who made Ladakh's cause national — has not eaten since [June 28]. He is fasting beside a [Gen Z-led] sit-in, not for the statehood campaign that made him famous.
- layout: stat
