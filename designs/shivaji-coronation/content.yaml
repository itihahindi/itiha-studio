name: the-coronation-of-shivaji
format: instagram-portrait
caption: |
  On 6 June 1674, seventy-two minutes before sunrise, a Maratha king ascended a throne of gold and jewels at Raigad fort and took the title Kshatriya-Kulawatansa Shri Raja Shivachhatrapati. The ceremony, designed by the Banaras scholar Gagabhatt and codified in a treatise written specifically for the occasion, was the first time in centuries that a Hindu sovereign had been formally enthroned on the subcontinent according to full Vedic rite. The English East India Company sent a delegation. Henry Oxenden recorded what he saw.

  This carousel reconstructs the coronation from the contemporary sources: the _Rajabhishekaprayoga_ — the treatise commissioned to specify each rite — and the diary of Henry Oxenden, the English envoy who arrived from Surat with diamond rings and pearl necklaces and watched the new Chhatrapati assume his throne. The preparations spanned weeks. On 29 May, Shivaji underwent the _maunjibandhanam_ — the sacred thread ceremony — and was weighed against gold, silver, copper, iron, cloth, spices, butter, sugar, and fruits. On 30 May, because his earlier marriages had taken place before his thread ceremony, he was re-married to his queens by full Vedic rite. From 31 May to 4 June, the priests performed the Aindrishantividhi, the Grahayajna, the Nakshatrahoma, and the Nivrittiyag. The total expenditure ran between 150,000 and 14.2 million Hons — so vast that a new tax, the Sinhasan Patti, was instituted to cover it. Twelve days after the throne was claimed, Jijabai — the mother who had raised the king — died. A Tantrik priest declared the first coronation ritually flawed. On 24 September 1674, Shivaji was crowned again, by Tantrik rite this time, to set the record straight before the gods.

  The coronation at Raigad was not just the founding of a state. It was the restoration of a sovereignty that the subcontinent had not formally claimed for itself in five hundred years.

  @itiha29 · itiha.info
