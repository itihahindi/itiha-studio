name: puri-rath-yatra-2026
brand: vaq-hq
format: instagram-portrait
caption: |
  India's largest chariot festival opened on Thursday with a death.

  Lakhs of devotees filled the Grand Road in Puri on July 16 as Lord Jagannath, Lord
  Balabhadra and Goddess Subhadra were carried out of the sanctum in the Pahandi ritual
  and placed on three chariots. It is the one day of the year the deities leave the
  temple. The Gajapati Maharaja of Puri swept the decks with a golden broom, and the
  pulling began.

  Then the crowd broke. A surge near the Singhadwara, the temple's main gate, left at
  least one devotee dead after he collapsed with breathing difficulty. Fire crews pulled
  around 100 people out of the crush. About 50 were admitted to hospital. Reports differ
  on the toll, and some outlets put it at two.

  Odisha had built for this. More than 12,000 police, 19 senior IPS officers, CRPF, BSF
  and NSG units, drones, 65 LED screens, and 470 AI-enabled cameras along the Bada Danda,
  installed specifically to detect overcrowding and trigger corrective action. Former
  Chief Minister Naveen Patnaik said he hoped the state would ensure the safety of
  devotees by properly managing the crowds.

  The chariots are now at the Gundicha Temple, three kilometres away. They return on
  July 24.

  File photos: Prashant Kharote, Radeeh, Bernard Gagnon, Krupasindhu Muduli via
  Wikimedia Commons, CC BY-SA.

