    The First Poem.
    The Last *Fast.*
  items:
  - number: '9'
    headline: A published poet at twelve
    body: His poem [Swadeshi ki Phatkaar] appeared in the newspaper [Jagat Hitecchu] when he was [twelve
      years old]. The editor had no idea the author was a [schoolboy] in Nashik.
  - number: '10'
    headline: Atmarpan at eighty-three
    body: In [1966], at [eighty-three], Savarkar chose to end his life through [Atmarpan] — voluntary
      self-sacrifice. He stopped all [food] and [medicine] and remained [alert] for [twenty-two days]
      until his body gave up. He chose the hour.
  item_size: 40
