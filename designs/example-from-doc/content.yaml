- layout: story
  headline: |
    The Math Of
    Every *Front.*
  body: |
    [Sita Ram Goel] read the directive as a template. [Spain], [France], [Czechoslovakia] — every [united front] the communists ever offered followed the same arithmetic. A small percentage for the [stated enemy]. A larger percentage for the [stated ally]. The largest, always, for the [Party itself]. The number that mattered was never the [ten]. It was the [seventy].
