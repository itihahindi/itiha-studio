<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Carousel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  :root {
    --slide-width: 1080px; --slide-height: 1350px;
    --editor-w: 460px;
    --preview-scale: 0.45;   /* Default ~feed size on desktop. Override per-zoom-level via JS. */
  }
  html,body{margin:0;padding:0;background:#000}

  /* Capture mode: viewport matches slide dimensions exactly. */
  body.capture { width: var(--slide-width); height: var(--slide-height); overflow: hidden; }
  body.capture #root { width: var(--slide-width); height: var(--slide-height); position: relative; transform: none !important; }
  body.capture .stage { width: var(--slide-width); height: var(--slide-height); }
  body.capture #prev-toolbar, body.capture #editor { display: none !important; }

  /* Preview mode: scrollable, slide scaled down to feed-ish size.
     The .stage wrapper reserves the SCALED dimensions for layout, while
     #root renders at native size and is shrunk via CSS transform. This
     keeps the slide's internal pixel measurements untouched (no zoom-
     induced wrap differences) while letting the user see Instagram-feed-
     size text legibility. */
  body:not(.capture) {
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    padding: 76px 24px 80px; box-sizing: border-box;
  }
  body:not(.capture).editor-open { padding-right: calc(var(--editor-w) + 24px); }
  body:not(.capture) .stage {
    width: calc(var(--slide-width) * var(--preview-scale));
    height: calc(var(--slide-height) * var(--preview-scale));
    position: relative;
    outline: 1px solid #1c1c1c;
    overflow: hidden;
    flex: 0 0 auto;
  }
  body:not(.capture) #root {
    width: var(--slide-width); height: var(--slide-height);
    position: absolute; left: 0; top: 0;
    transform: scale(var(--preview-scale));
    transform-origin: top left;
  }

  /* Top navigation bar */
  #top-nav{position:fixed;left:0;right:0;top:0;height:52px;background:#0a0a0a;color:#888;
    font:12px/52px 'JetBrains Mono',monospace;display:flex;align-items:center;gap:18px;padding:0 18px;
    border-bottom:1px solid #1a1a1a;z-index:9999;letter-spacing:1.2px;text-transform:uppercase}
  #top-nav a.home{color:#888;text-decoration:none;display:flex;align-items:center;gap:8px}
  #top-nav a.home:hover{color:#E8DCC8}
  #top-nav .wordmark{font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;letter-spacing:2px;color:#E8DCC8;line-height:1}
  #top-nav .wordmark .dot{color:#C0392B}
  #top-nav .sep{width:1px;height:20px;background:#222}
  #top-nav .proj{color:#E8DCC8;font-weight:600;letter-spacing:1.6px;text-transform:uppercase}
  #top-nav .badge{display:inline-block;padding:3px 9px;background:#0a0a0a;border:1px solid #222;color:#aaa;font-size:10px;letter-spacing:1.6px}
  #top-nav .counter{color:#666;font-size:11px}
  #top-nav .spacer{flex:1}
  #top-nav button{background:#1a1a1a;color:#ddd;border:1px solid #333;padding:7px 14px;
    font:11px 'JetBrains Mono',monospace;letter-spacing:1.4px;text-transform:uppercase;cursor:pointer}
  #top-nav button:hover{background:#222;color:#fff}
  #top-nav button.primary{background:#C0392B;color:#fff;border-color:#C0392B}
  #top-nav button.primary:hover{background:#A83225}
  #top-nav button:disabled{opacity:0.4;cursor:not-allowed}
  body.editor-open #top-nav { right: var(--editor-w); }

  /* Bottom preview toolbar */
  #prev-toolbar{position:fixed;left:0;right:0;bottom:0;height:44px;background:#0a0a0a;color:#888;
    font:12px/44px 'JetBrains Mono',monospace;display:flex;align-items:center;gap:16px;padding:0 14px;
    border-top:1px solid #222;z-index:9998;letter-spacing:1.2px;text-transform:uppercase}
  #prev-toolbar button{background:#1a1a1a;color:#ddd;border:1px solid #333;padding:6px 12px;
    font:11px 'JetBrains Mono',monospace;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer}
  #prev-toolbar button:hover{background:#222;color:#fff}
  body.editor-open #prev-toolbar { right: var(--editor-w); }

  /* Editor mount point */
  #editor:empty { display: none; }
</style>
</head>
<body>
<nav id="top-nav" style="display:none">
  <a class="home" href="/" title="Back to project picker">← <span class="wordmark">ITIHA<span class="dot">.</span></span></a>
  <span class="sep"></span>
  <span class="proj" id="nav-proj">—</span>
  <span class="badge" id="nav-format">—</span>
  <span class="counter" id="nav-counter">—</span>
  <span class="spacer"></span>
  <button id="nav-save">Save</button>
  <button id="nav-render" class="primary">Render</button>
</nav>
<div class="stage"><div id="root"></div></div>
<div id="editor"></div>
<div id="prev-toolbar" style="display:none">
  <button id="btn-prev">◀</button>
  <button id="btn-next">▶</button>
  <span id="prev-label">—</span>
  <button id="btn-phone" style="margin-left:auto">Phone</button>
  <button id="btn-edit">Edit</button>
  <span id="prev-status" style="color:#555;margin-left:14px">loading…</span>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="slides-shared.jsx"></script>
<script type="text/babel" src="layouts.jsx"></script>
<script src="manifest.js"></script>
<script type="text/babel" src="editor.jsx"></script>

<script type="text/babel">
async function loadContent() {
  const r = await fetch('content.json?t=' + Date.now());
  if (!r.ok) throw new Error('content.json missing');
  return r.json();
}

function applyDimensions(c) {
  if (c && c.format_dims) {
    document.documentElement.style.setProperty('--slide-width',  c.format_dims.width  + 'px');
    document.documentElement.style.setProperty('--slide-height', c.format_dims.height + 'px');
  }
}

// ── Phone preview overlay ──────────────────────────────────────
// A distraction-free, phone-shaped view of the current slide. The slide is
// rendered at native size and shrunk via CSS transform so a ResizeObserver
// keeps the scale tight to the inner screen as the viewport changes.
function PhonePreview({ comp: Comp, slide, idx, tweaks, dims, total, onClose, onPrev, onNext }) {
  const screenRef = React.useRef(null);
  const [scale, setScale] = React.useState(0.3);
  React.useEffect(() => {
    if (!screenRef.current) return;
    const calc = () => {
      const el = screenRef.current; if (!el) return;
      // Fit width — for 4:5 portrait slides in a 9:19.5 phone, height has room.
      const w = el.clientWidth;
      setScale(w / dims.width);
    };
    calc();
    const ro = new ResizeObserver(calc);
    ro.observe(screenRef.current);
    return () => ro.disconnect();
  }, [dims.width, dims.height]);

  const slideH = dims.height * scale;
  const btn = {
    background: 'rgba(255,255,255,0.06)', color: '#E8DCC8',
    border: '1px solid rgba(255,255,255,0.18)', padding: '14px 18px',
    font: '20px "DM Sans", system-ui', cursor: 'pointer', borderRadius: 0,
  };
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 100000,
      background: 'rgba(0,0,0,0.94)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: 32, padding: 28,
    }}>
      <button onClick={e => { e.stopPropagation(); onPrev(); }} style={btn} title="Previous (←)">◀</button>

      {/* Phone bezel */}
      <div onClick={e => e.stopPropagation()} style={{
        position: 'relative', height: 'min(86vh, 820px)', aspectRatio: '9 / 19.5',
        background: '#0a0a0a', borderRadius: 52, padding: 10,
        boxShadow: '0 30px 100px rgba(0,0,0,0.7), 0 0 0 1px #1a1a1a',
      }}>
        {/* Inner screen */}
        <div ref={screenRef} style={{
          position: 'relative', width: '100%', height: '100%',
          borderRadius: 44, overflow: 'hidden', background: '#000',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {/* Dynamic-island mock */}
          <div style={{
            position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
            width: 100, height: 28, background: '#000', borderRadius: 14, zIndex: 2,
            border: '1px solid #1a1a1a',
          }} />
          {/* The slide — rendered at native size, scaled to inner-screen width.
              Wrapped in a sized stage so flex-center can position it correctly;
              `translateY(-50%) scale()` doesn't work with transform-origin top-left
              because the percent translate references the un-scaled height. */}
          <div style={{
            width: dims.width * scale, height: dims.height * scale,
            position: 'relative', overflow: 'hidden', flex: '0 0 auto',
          }}>
            <div style={{
              position: 'absolute', left: 0, top: 0,
              width: dims.width, height: dims.height,
              transform: `scale(${scale})`,
              transformOrigin: 'top left',
            }}>
              <window.ItihaContext.Provider value={tweaks}>
                <Comp slide={slide} index={idx} />
              </window.ItihaContext.Provider>
            </div>
          </div>
          {/* Slide counter pill */}
          <div style={{
            position: 'absolute', bottom: 14, left: '50%', transform: 'translateX(-50%)',
            background: 'rgba(0,0,0,0.55)', color: '#fff',
            fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 1.4,
            padding: '4px 10px', borderRadius: 12, zIndex: 2,
          }}>{String(idx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}</div>
        </div>
      </div>

      <button onClick={e => { e.stopPropagation(); onNext(); }} style={btn} title="Next (→)">▶</button>

      <button onClick={onClose} style={{
        position: 'absolute', top: 18, right: 22,
        background: 'transparent', color: '#888',
        border: '1px solid #333', padding: '7px 14px',
        font: '11px "JetBrains Mono", monospace', letterSpacing: 1.4,
        textTransform: 'uppercase', cursor: 'pointer',
      }}>Close · Esc</button>
    </div>
  );
}

function App() {
  const [content, setContentState] = React.useState(null);   // editable in-memory state
  const [savedSnapshot, setSavedSnapshot] = React.useState(null); // last-saved-to-disk version
  const [idx, setIdx] = React.useState(0);
  const [editorOpen, setEditorOpen] = React.useState(false);
  const [phonePreview, setPhonePreview] = React.useState(false);
  const [savedAt, setSavedAt] = React.useState(null);
  const [saveError, setSaveError] = React.useState(null);
  const [loadError, setLoadError] = React.useState(null);

  // ── Undo / redo stacks ──────────────────────────────────────
  // Each user-driven setContent pushes the *prior* content onto undoStack and
  // clears redoStack. We debounce rapid edits (typing in a textarea) so a 5-
  // character burst is one undo entry, not five. undo() and redo() use
  // setContentState directly to bypass the wrapper, so they don't accidentally
  // push their own restoration onto the stack.
  const undoStackRef  = React.useRef([]);
  const redoStackRef  = React.useRef([]);
  const lastPushAtRef = React.useRef(0);
  const HISTORY_LIMIT = 50;
  const PUSH_GAP_MS   = 500;

  const setContent = (next) => {
    if (content !== null) {
      const now = Date.now();
      if (now - lastPushAtRef.current > PUSH_GAP_MS) {
        undoStackRef.current.push(content);
        if (undoStackRef.current.length > HISTORY_LIMIT) undoStackRef.current.shift();
        redoStackRef.current = [];   // any new edit invalidates the redo branch
      }
      lastPushAtRef.current = now;
    }
    setContentState(next);
    applyDimensions(next);
  };

  const undo = React.useCallback(() => {
    if (!undoStackRef.current.length) return;
    const prev = undoStackRef.current.pop();
    redoStackRef.current.push(content);
    if (redoStackRef.current.length > HISTORY_LIMIT) redoStackRef.current.shift();
    setContentState(prev);
    applyDimensions(prev);
  }, [content]);

  const redo = React.useCallback(() => {
    if (!redoStackRef.current.length) return;
    const next = redoStackRef.current.pop();
    undoStackRef.current.push(content);
    if (undoStackRef.current.length > HISTORY_LIMIT) undoStackRef.current.shift();
    setContentState(next);
    applyDimensions(next);
  }, [content]);

  const reloadFromDisk = React.useCallback(() => {
    loadContent().then(c => {
      setContentState(c);
      setSavedSnapshot(JSON.stringify(c));
      applyDimensions(c);
      setLoadError(null);
      // External reload replaces in-memory state with disk state — drop the
      // undo branch we no longer know how to relate to.
      undoStackRef.current = [];
      redoStackRef.current = [];
    }).catch(e => setLoadError(String(e)));
  }, []);

  React.useEffect(() => { reloadFromDisk(); }, [reloadFromDisk]);

  // Suppress reload on our own writes by tracking the version we just saved.
  const ownVersionRef = React.useRef(null);

  // Poll /version.txt for *external* changes. If the version matches the one
  // we just saved (or the editor is open and dirty), don't clobber state.
  React.useEffect(() => {
    if (!window.__previewMode) return;
    let live = true;
    let last = null;
    const tick = async () => {
      try {
        const r = await fetch('version.txt?t=' + Date.now());
        const v = (await r.text()).trim();
        if (last !== null && v !== last && v !== ownVersionRef.current) {
          // External edit. If user has unsaved changes, leave them alone.
          const dirty = JSON.stringify(content) !== savedSnapshot;
          if (!dirty) reloadFromDisk();
        }
        last = v;
      } catch (e) { /* ignore */ }
      if (live) setTimeout(tick, 500);
    };
    tick();
    return () => { live = false; };
  }, [content, savedSnapshot, reloadFromDisk]);

  // Expose capture / nav API.
  React.useEffect(() => {
    window.__setSlide = n => setIdx(n);
    window.__reload = reloadFromDisk;
    window.__step = d => {
      if (!content) return;
      setIdx(i => Math.max(0, Math.min(content.slides.length - 1, i + d)));
    };
  });

  const [rendering, setRendering] = React.useState(false);

  const render = async () => {
    setRendering(true);
    try {
      if (dirty) await save();
      const r = await fetch('api/render', { method: 'POST' });
      if (!r.ok) throw new Error(await r.text());
    } catch (e) {
      setSaveError(String(e.message || e));
    } finally {
      setRendering(false);
    }
  };

  // Wire toolbars (preview only).
  React.useEffect(() => {
    if (!window.__previewMode) return;
    // Top nav
    const nav = document.getElementById('top-nav');
    nav.style.display = 'flex';
    const proj = document.getElementById('nav-proj');
    const format = document.getElementById('nav-format');
    const counter = document.getElementById('nav-counter');
    if (content) {
      proj.textContent = content.name || '—';
      format.textContent = content.format || '—';
      counter.textContent = `${String(idx + 1).padStart(2,'0')} / ${String(content.slides.length).padStart(2,'0')} · ${content.slides[idx]?.layout || ''}`;
    }
    const navSave = document.getElementById('nav-save');
    const navRender = document.getElementById('nav-render');
    navSave.disabled = !dirty;
    navSave.textContent = dirty ? 'Save *' : (savedAt ? 'Saved' : 'Save');
    navSave.onclick = save;
    navRender.disabled = rendering;
    navRender.textContent = rendering ? 'Rendering…' : 'Render';
    navRender.onclick = render;

    // Bottom toolbar
    const tb = document.getElementById('prev-toolbar');
    tb.style.display = 'flex';
    const lbl = document.getElementById('prev-label');
    const status = document.getElementById('prev-status');
    if (content) lbl.textContent = `${String(idx + 1).padStart(2,'0')} / ${String(content.slides.length).padStart(2,'0')} · ${content.slides[idx]?.layout || ''}`;
    if (loadError) { status.textContent = loadError; status.style.color = '#c0392b'; }
    else if (saveError) { status.textContent = saveError; status.style.color = '#c0392b'; }
    else { status.textContent = 'live'; status.style.color = '#5a8'; }
    document.getElementById('btn-prev').onclick = () => window.__step(-1);
    document.getElementById('btn-next').onclick = () => window.__step(+1);
    document.getElementById('btn-edit').onclick = () => setEditorOpen(o => !o);
    document.getElementById('btn-phone').onclick = () => setPhonePreview(p => !p);
  });

  // Toggle body class for layout shift when editor is open.
  React.useEffect(() => {
    document.body.classList.toggle('editor-open', editorOpen);
  }, [editorOpen]);

  const dirty = content ? (JSON.stringify(content) !== savedSnapshot) : false;

  const savingRef = React.useRef(false);

  const save = async () => {
    if (savingRef.current) return;  // collapse redundant calls while one is in flight
    savingRef.current = true;
    setSaveError(null);
    const snapshot = JSON.stringify(content);   // capture so a save mid-edit records what we sent
    try {
      const r = await fetch('api/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: snapshot,
      });
      if (!r.ok) throw new Error(await r.text());
      const { version } = await r.json();
      ownVersionRef.current = version;
      setSavedSnapshot(snapshot);
      setSavedAt(Date.now());
    } catch (e) {
      setSaveError(String(e.message || e));
    } finally {
      savingRef.current = false;
    }
  };

  // Auto-save: after 1.5s of no further edits, write to disk. Skips when a
  // prior save failed — the user has to manually click Save (or edit again,
  // which re-triggers) so a broken server doesn't hammer the endpoint.
  const AUTO_SAVE_MS = 1500;
  const autoSaveTimerRef = React.useRef(null);
  React.useEffect(() => {
    if (!dirty || saveError) return;
    if (autoSaveTimerRef.current) clearTimeout(autoSaveTimerRef.current);
    autoSaveTimerRef.current = setTimeout(() => { save(); }, AUTO_SAVE_MS);
    return () => {
      if (autoSaveTimerRef.current) clearTimeout(autoSaveTimerRef.current);
    };
  }, [content, savedSnapshot, saveError]);

  // Keyboard: ←/→ for prev/next, Cmd-S to save, Cmd-Z / Cmd-Shift-Z for undo/redo.
  React.useEffect(() => {
    const onKey = e => {
      if (!window.__previewMode) return;
      if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); if (dirty) save(); return; }
      if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); return; }
      if ((e.metaKey || e.ctrlKey) && ((e.shiftKey && (e.key === 'z' || e.key === 'Z')) || e.key === 'y')) { e.preventDefault(); redo(); return; }
      if (e.key === 'Escape' && phonePreview) { setPhonePreview(false); return; }
      // Don't grab arrow keys when typing in the editor.
      if (document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
      if (e.key === 'ArrowLeft')  window.__step(-1);
      if (e.key === 'ArrowRight') window.__step(+1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  if (loadError && !content) return <div style={{ color: '#c0392b', padding: 40, fontFamily: 'monospace' }}>load error: {loadError}</div>;
  if (!content) return <div style={{ color: '#888', padding: 40, fontFamily: 'monospace' }}>loading…</div>;

  const slide = content.slides[idx];
  const Comp = slide ? window.LAYOUTS[slide.layout] : null;
  const TWEAKS = Object.assign({
    showChapterLabels: false, showStamp: true, showPageNum: true, overlayDarkness: 62, showGrain: true,
    seriesLabel: '', totalSlides: content.slides.length,
  }, content.tweaks || {});

  return (
    <>
      {Comp ? (
        <window.ItihaContext.Provider value={TWEAKS}>
          <Comp slide={slide} index={idx} />
        </window.ItihaContext.Provider>
      ) : (
        <div style={{ color: '#c0392b', padding: 40, fontFamily: 'monospace' }}>
          {slide ? `unknown layout: ${slide.layout}` : `slide ${idx} out of range`}
        </div>
      )}
      {window.__previewMode && editorOpen && ReactDOM.createPortal(
        // Wrap the Editor in the same tweak context so the SlideStrip thumbnails
        // pick up showStamp / showPageNum / overlayDarkness / seriesLabel.
        <window.ItihaContext.Provider value={TWEAKS}>
          <window.Editor
            content={content} setContent={setContent}
            currentIdx={idx} setCurrentIdx={setIdx}
            onSave={save} savedAt={savedAt} dirty={dirty} error={saveError}
          />
        </window.ItihaContext.Provider>,
        document.getElementById('editor'),
      )}
      {window.__previewMode && phonePreview && Comp && content && (
        <PhonePreview
          comp={Comp} slide={slide} idx={idx}
          tweaks={TWEAKS} dims={content.format_dims}
          total={content.slides.length}
          onClose={() => setPhonePreview(false)}
          onPrev={() => window.__step(-1)}
          onNext={() => window.__step(+1)}
        />
      )}
    </>
  );
}

if (new URLSearchParams(location.search).get('capture') === '1') {
  document.body.classList.add('capture');
}
if (new URLSearchParams(location.search).get('preview') === '1') {
  window.__previewMode = true;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
