  chapter: Chapter 03 · Two Standards Of Care
  left_label: The Dying In Calcutta
  left_headline: 'Reused Needles.

    *Aspirin.*

    '
  left_body: 'Volunteers testified that [terminal patients] at the Calcutta clinics received [reused syringes],
    no diagnostic equipment, and no pain relief beyond [aspirin]. The suffering, Teresa said, was [beautiful].

    '
  right_label: Teresa Herself
  right_headline: 'Scripps Clinic.

    *California.*

    '
  right_body: When Teresa needed treatment, she flew to the [Scripps] Clinic in [California], to private
    hospitals in [Rome], to the best [cardiologists] money could find. She never spent a night in one
    of her own [homes for the dying].
  body_size: 43
