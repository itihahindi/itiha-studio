name: how-the-british-built-dowry
format: instagram-portrait
caption: |
  The British loved to denounce dowry as a barbaric Indian custom. They left out the part where they invented it. Before the Company arrived, dowry across most of India was voluntary — a gift, a mark of love, the moveable property a daughter carried into her new home. Within a few decades of British land revenue policy, it had become an extortionate demand that bankrupted families and turned daughters into liabilities. The transformation was not cultural. It was fiscal.

  This carousel draws on Arvind Sharma's _The Ruler's Gaze: A Study of British Rule Over India from a Saidian Perspective_, which traces the mechanism step by step. Before colonial rule, land in Punjab and across much of India was held under forms of communal ownership — different groups held different rights to the same soil, and the burden of raising daughters was light. The ryotwari and similar settlements destroyed this. Land was converted to private property that could be bought, sold, and mortgaged. The British demanded fixed revenue payments on fixed dates, set higher than any previous regime, regardless of monsoon failure or crop collapse. Peasants borrowed from moneylenders. Moneylenders were given the legal right to auction the land when debts came due. To save the ancestral land from the auctioneer's block, families seized on every available source of wealth — and dowry was the largest one within reach. The voluntary gift became "dreaded payments on demand." Daughters became burdens. The husband's family learned to extract. And British administrators, having engineered the crisis, wrote essays blaming Hindu tradition for it.

  Every modern dowry death has a paper trail. It leads to a Company land record.

  @itiha29 · itiha.info
