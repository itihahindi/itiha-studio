  chapter: Chapter 01 · The Engineer
  name: G.D. Agrawal
  dates: 1932–2018
  role: Environmental engineer, professor, and Hindu monk
  headline: |
    Not A Passing
    *Activist.*
  body: '[G.D. Agrawal] was not a passing activist. He was a brilliant [environmental engineer], a former
    [professor], and a [Hindu monk] who saw the [River Ganga] as a [living, sacred entity]. While most
    people might sign a petition or share a hashtag to show they care about the environment, Agrawal put
    his actual [life on the line].'
  image: https://m.thewire.in/sortd-service/imaginary/v22-01/jpg/large/high?url=dGhld2lyZS1pbi1wcm9kLXNvcnRkL21lZGlhMjZiZWNmODAtNGRmOS0xMWYwLWI1ZTUtYTFmMGIwMDBiNjBjLnBuZw==
