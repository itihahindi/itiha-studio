name: the-tales-of-truschke
format: instagram-portrait
caption: |
  She is an Associate Professor of Indian history at Rutgers. She has been cited by the Oxford Research Encyclopedia of Asian History. And in 2018, she claimed that in Valmiki's Ramayana, Sita called Lord Rama a "misogynist pig." When the world's foremost Sanskritist — the very translator she cited — publicly refuted her, calling the rendering "vulgar" and "inappropriate," she neither retracted nor apologised. She compared herself to Sita.

  This carousel draws on _Truschke-nāma or The Tales of Truschke_ by Subhodeep Mukhopadhyay and Manogna Sastry, a chapter in the 2023 volume _Ten Heads of Ravana: A Critique of Hinduphobic Scholars_ from Infinity Foundation India. Mukhopadhyay and Sastry document a consistent methodology in Audrey Truschke's published work: cherry-picked evidence, intentional mistranslation, and victim-blaming dressed in academic language. She insists Aurangzeb destroyed "at most a few dozen" temples, leaning on Richard Eaton's count of 80 desecrations across five centuries — while dismissing the Maasir-i-Alamgiri, the 1710 Persian chronicle written with access to Aurangzeb's state archives, which records the destruction of 238 temples in just two months in 1680. She declares the same chronicle unreliable when it inflates numbers, then quotes a single line from it to claim temple destructions were "rare." She argues Aurangzeb's iconoclasm was not religious but a response to "deviant Brahmins" teaching "depraved knowledge" — producing zero historical evidence that any such investigation was ordered. She insists, against scholarly rebuttal, that Hindu and Islamic iconoclasm were the same thing. She dismissed the Ayodhya verdict without engaging with the Archaeological Survey of India's findings. She holds, against the genetic and archaeological consensus now consolidating against it, that the Aryan Migration Theory is "ironclad."

  Mukhopadhyay and Sastry's verdict is direct: this is not scholarship. It is propaganda wearing the costume of scholarship.

  @itiha29 · itiha.info
