- layout: split-story
  chapter: Chapter 05 · The Paper Trail
  headline: |
    Published Before
    The *Dispute.*
  body: |
    These inscriptions were not produced for any modern argument. The pillar grammars were documented by [K.K. Lele] in [1903]. The drama inscription was edited by [Eugen Hultzsch] and published in [Epigraphia Indica] Vol. 8 in [1905–06].
    The Vāgdevī inscription was analysed by [O.C. Gangoly] in the journal _Rūpam_ in [1924]. The record was settled in academic print decades before the site became a [controversy].
  headline_size: 100
  body_size: 42
  texture: halftone
- layout: closing
  headline: |
    The Inscriptions
    Were *First.*
  body: |
    No primary source from Bhoja's time, or earlier, describes a [mosque] at Dhar. Four independent epigraphic records — across [two centuries] of Paramara rule — describe a temple of [Sarasvati] and a school of Sanskrit. The stones are dated. The publications are dated. The order is not in dispute.
  headline_size: 120
