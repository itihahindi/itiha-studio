- layout: split-story
  chapter: Chapter 04 · The Mechanism
  headline: |
    No Conquest.
    Just *Marriage.*
  body: The primary mechanism of Hinduisation was [peaceful settlement] and [intermarriage]. Indian emigrants
    permanently settled in foreign lands and married [local women]. The fusion was so complete that the
    historical record frequently cannot distinguish between the two populations. The locals adopted [Hindu
    names], [Sanskrit] and [Pali], and Hindu religious practices. The Indian colonists imbibed [local
    habits] and merged into the [local communities].
  body_size: 45
  headline_size: 75
  body_y: 90
- layout: did-you-know
  eyebrow: Did You Know?
  theme: light
  headline: |
    A Brahmin Founded
    *Cambodia.*
  body: |
    A Brahmin named [Kaundinya] arrived in what is now Cambodia on a [trading vessel] near the start of the [Christian era]. He defeated the local sovereign [Queen Lieu-ye] in a brief encounter, then [married] her. Their union founded [Fu-nan] — the first [Hindu kingdom] in Southeast Asia. A second Kaundinya followed and completely [Brahmanised] the country, introducing Indian [laws], [manners], and [customs].
  source: R.C. Majumdar, Ancient Indian Colonisation in South-East Asia
