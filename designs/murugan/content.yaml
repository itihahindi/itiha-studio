name: how-they-are-appropriating-murugan
brand: itiha
format: instagram-portrait
caption: |
  Lord Murugan — the Tamil god of celestial armies and wisdom, son of Shiva and Parvati, husband of Valli and Devasena, whose vehicle is the peacock and whose name literally means "Beauty" — is one of the most cherished Hindu deities in South India. He is now being systematically appropriated. Christian evangelists and Dravidianist scholars are, through academic conferences, iconographic distortion, and rewritten folk songs, working to reclassify him first as a non-Hindu figure, then as a "corrupt form" of a Christian saint. This carousel is the record of how the appropriation is being executed — and where its specific fingerprints can be identified.

  Four documented methods. First, de-Hinduising through academic forums: figures like John Samuel of the Institute of Asian Studies and the Western scholar Patrick Harrigan have organised international conferences that deliberately explain Murugan outside of his Hindu context — creating the academic distance required to later claim he is a "misidentified Christian saint." Second, appropriating the Somaskanda iconography: the traditional sculpture of the child-god Skanda flanked by Shiva and Parvati is being falsely reinterpreted as a revelation of the Christian Trinity. Evangelical writer M. Deivanayagam has asserted that Murugan originally had no father — an invention deployed to argue that Trinitarian teachings in Saivism were "stolen from early Christianity." Third, distorting folk literature: the scholar S.D. Lourdu equated a traditional Tamil folk song about Murugan searching for Valli hidden near a mountain with a newly composed Christian song — "Jesus ran and hid himself in the bush. Mary searched for Jesus" — deliberately collapsing the mystical bridegroom-bride dynamic of Murugan and Valli into the mother-child dynamic of Jesus and Mary. Fourth, stealing visual symbols: at the San Thome Church in Chennai, Jesus is depicted standing on a lotus surrounded by peacocks — a bird uniquely associated with Murugan in Tamil Hindu iconography.

  These are not accidental overlaps. They are coordinated textual, academic, and iconographic manipulations — designed to strip Murugan of his Hindu origins and repurpose his immense popularity as an evangelical tool.

