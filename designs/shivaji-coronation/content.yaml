- layout: split-story
  chapter: Chapter 07 · The Second Coronation
  headline: |
    Twelve Days Later,
    *Jijabai* Died.
  body: Twelve days after the throne was claimed, [Jijabai], the mother who had raised the king, passed
    away at [Pachad]. The deaths of Queen [Kashibai] and the commander [Prataprao Gujar], along with [lightning]
    striking Pratapgad, were taken as omens. The Tantrik priest [Nischalpuri] declared the first coronation
    [ritually flawed]. On [24 September 1674], Shivaji was crowned again, this time by [Tantrik] rite.
    The throne would be claimed [twice], to settle the matter before the gods.
  headline_size: 75
  body_size: 42
  texture: halftone
- layout: closing
  headline: |
    A Sovereignty
    *Reclaimed.*
  body: |
    Before that morning at [Raigad], the subcontinent had not formally enthroned a [Hindu sovereign] by full Vedic rite for a while. After it, the [Swarajya] was a kingdom, not a [rebellion], not a [chieftaincy], but a [Chhatrapati's] domain, with its own [calendar], its own [coinage], and its own [seat].
