- layout: story
  headline: |
    A Cancer In
    The *Body.*
  body: Goel quoted the French specialist [Suzanne Labin]. Whatever tactical face the [Communist Party]
    wore in a given decade, it remained — in her phrase — a [cancer within the body of the nation], whose
    function was to destroy healthy tissue and replace it. Those who imagined it could one day be assimilated,
    she wrote, were the [victims of the most dangerous political illusion]. Goel applied the diagnosis
    to India.
  quote_size: 35
  image_bw: true
  image_overlay: 1
  body_size: 44
  theme: dark
