caption: |
  India's most famous Ladakh activist is 19 days into a hunger strike at Jantar Mantar —
  and it isn't about Ladakh. Sonam Wangchuk is fasting alongside a Gen Z sit-in demanding
  the Education Minister resign over the exam paper leaks that hit 22 lakh students.

