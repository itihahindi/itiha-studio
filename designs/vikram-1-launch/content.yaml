name: vikram-1-launch
brand: vaq-hq
format: instagram-portrait
caption: |
  India just entered a new space age. Skyroot's Vikram-1 — mission "Aagaman" —
  became the country's first privately built rocket to reach orbit, lifting off
  from Sriharikota on July 18 and injecting its payloads into a ~450 km orbit.

  On board: the SCOPE tech-demo satellite, rideshare and in-orbit experiments,
  and symbolic payloads — a lab-grown "Cosmic Bloom" diamond and an 18-karat
  gold micro-rocket.

  Sources: Space.com · Al Jazeera · CNBC.

  @vaqhq · vaqhq.com
