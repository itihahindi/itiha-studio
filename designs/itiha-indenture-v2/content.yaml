- layout: story
  chapter: Chapter 01 · The Provocation
  headline: |
    A Pamphlet With
    A Strange *Title.*
  body: In the mid-[1950s], a small press in [Delhi] published a pamphlet by [Sita Ram Goel] for the _Society
    for Defence of Freedom in Asia_. Its claim was blunt. The party calling itself the [Communist Party
    of India] was not a party. It was not Indian. It was the [Soviet Communist Party's Section] operating
    under an Indian name.
  image: screenshot-2026-05-11-at-1-01-27-am.png
  block_y: top
  body_size: 50
  image_position: '9'
  theme: dark
