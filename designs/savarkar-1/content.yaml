- layout: did-you-know
  body: |
    At the [Cellular Jail], Savarkar was initially the [only] prisoner classified as [Class D] — "Dangerous." The letter was inscribed on his prison [clothing] itself. The British never doubted what he was. They marked him.
  source: 'Vikram Sampath, Savarkar: Echoes from a Forgotten Past'
  body_size: 50
