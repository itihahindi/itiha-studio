name: the-plots-to-free-savarkar
format: instagram-portrait
caption: |
  The British called him the most dangerous man in the empire. The world's revolutionaries agreed — and four times, on three continents, they tried to break him out of the Cellular Jail. A German submarine was to be dispatched to Port Blair. An armed ship sailed from East Asia and was sunk by a British cruiser. A merchant-spy was sent to disable the wireless and arm the prisoners. The British, watching all of it, became convinced a bomb factory was running inside the jail itself.

  This carousel draws on Vikram Sampath's two-volume biography _Savarkar: Echoes from a Forgotten Past_ and _Savarkar: A Contested Legacy_, which reconstructs the four documented rescue attempts from colonial intelligence files, Ghadr Party correspondence, and German wartime archives. In each plan, the name at the top of the extraction list was the same: Vinayak Damodar Savarkar, with his brother Babarao close behind. The plots failed. The fact that they existed at all is the measure of who Savarkar was to the world outside the prison wall — and what the British were prepared to drown a ship to prevent.

  No Indian political prisoner of the twentieth century had four international rescue operations mounted on his behalf. The textbook does not mention one of them.

  @itiha29 · itiha.info
