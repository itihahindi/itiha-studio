  chapter: Chapter 05 · The Cultural Conquest
  headline: |
    What Indian
    Civilisation *Built.*
  items:
  - number: 1
    headline: Sanskrit became the language of record
    body: 'Almost every early inscription across Suvarnabhumi was written in [almost flawless] Sanskrit.
      The [Ramayana] and [Mahabharata] were translated into [Old Javanese], [Khmer], and [Cham] & adapted
      for the shadow-play tradition '
  - number: 2
    headline: The chaturvarna travelled too
    body: Indian colonists introduced the [chaturvarna], though the system was [modified] for local conditions.
      Intermarriage between varnas was [frequent].
  - number: 3
    headline: Kings ruled by the Arthashastra
    body: 'Political administration was modelled on Indian treatises. The [divine right] of kings was
      upheld; '
