  body: |
    The coronation had been delayed for years — the [Mughals] in the north, the [Adilshahi] in the south, the campaigns that left [Shivaji] no hour to spare for ceremony. [Jijabai], nearly [eighty], would not wait any longer. She made the journey to [Raigad] herself. She had spent a [lifetime] preparing him for that throne. She intended to [witness] him claim it.
  headline_size: 75
