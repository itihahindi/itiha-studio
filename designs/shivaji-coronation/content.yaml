- layout: split-story
  eyebrow: Did You Know?
  theme: dark
  headline: |
    The Diamond Rings.
    The Ruby *Bracelets.*
  body: |
    On [26 May 1674], the English delegates were granted their audience. They presented Shivaji, his son [Sambhaji], and his key ministers with gifts of [diamond rings], [pearl necklaces], and [ruby bracelets]. The Company had come to bargain over [reparations]. It would also become an [eyewitness] to the most consequential Hindu coronation in [five hundred years].
  source: Henry Oxenden's diary, 1674 — Bombay Factory Records
