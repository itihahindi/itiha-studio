  chapter: Chapter 03 · The First Forger
  headline: |
    G.U. Pope. 19th
    *Century.* Madras.
  body: The fabrication began with [George Uglow Pope], a [nineteenth-century] missionary Indologist who
    translated the Kural into English. Pope's thesis was that Thiruvalluvar had been [influenced by Christian
    teachers], and that the Kural was an [echo] of Christ's [Sermon on the Mount]. He offered no [textual]
    evidence , only assertion. The seed was planted.
  body_y: 23
  body_size: 45
