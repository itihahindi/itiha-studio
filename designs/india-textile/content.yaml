- layout: story
  chapter: Chapter 01 · The Inheritance
  headline: |
    A Trade Older
    Than The *Company.*
  body: In [1677], the annual import of Indian [calicoes] into Great Britain alone was valued at [£160,000]
    — a colossal sum for the seventeenth century. Indian cottons and silks could be sold in London at
    a [50–60%] discount to English-made cloth and still turn a profit. The looms of [Bengal], [Coromandel],
    and [Gujarat] were the workshop of the world.
