- layout: timeline
  chapter: Chapter 03 · The Preparations
  headline: |
    Eight Days Of
    Vedic *Rite.*
  items:
  - date: 29 May
    headline: The thread and the scales
    body: Shivaji underwent the [maunjibandhanam] — the sacred thread ceremony, followed by the [Tula],
      where he was weighed against [gold], [silver], [copper], [iron], cloth, spices, butter, sugar, and
      fruits.
  - date: 30 May
    headline: Re-married by Vedic rite
    body: Because his earlier marriages had taken place before his thread ceremony, Shivaji was [re-married]
      to his queens by full [Vedic] rite , the [Mantra-Vivah]  alongside the Ganesh Pujan and Punyahavachan.
  - date: 31 May – 4 June
    headline: The great sacrifices
    body: The Brahmins performed the [Aindrishantividhi], the [Grahayajna], the [Nakshatrahoma], the [Nakshatrayajna],
      and the [Nivrittiyag]. No rite was conducted on [2 June], a Tuesday, and a lunar phase considered
      inauspicious.
