- layout: split-story
  chapter: Chapter 02 · The Hostage
  headline: |
    A Hostage
      At *Eight.*
  body: |
    In [1665], the Treaty of [Purandar] forced Shivaji Maharaj into a painful choice. To keep the peace, he sent his eight-year-old son to the camp of the Mughal general [Mirza Raja Jai Singh].
      A small child was placed inside the [Mughal] war camp — and made a junior commander on paper, in charge of **5,000** soldiers.
  body_size: 45
  image: _cache/2d6da216b81d03a8.jpg
