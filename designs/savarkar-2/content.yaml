  body: 'The [Ghadr Party] and [German] agents drew up a parallel plan. An agent would land in the Andamans
    disguised as a [simple merchant]. His real task was three-fold: deliver [German-supplied weapons],
    disable the [wireless] station, and free the prisoners. Two names sat at the top of the rescue manifest
    — [Vinayak] and [Babarao Savarkar].'
