- layout: did-you-know
  eyebrow: A Civilisational Signature
  theme: light
  headline: |
    Shiva And The Buddha
    Were The *Same God.*
  body: |
    Across Suvarnabhumi, [Brahmanical] religion and [Buddhism] flourished side by side. A characteristic of Hinduisation was [profound religious toleration]. In [Javanese] theology, [Shiva] and the [Buddha] were closely associated & at moments, openly [identified] as the same divinity. The religious wars Europe took for normal were unimaginable in [Suvarnabhumi].
  source: R.C. Majumdar, Ancient Indian Colonisation in South-East Asia
  headline_size: 75
  body_offset_y: 110
  body_size: 45
- layout: closing
  headline: |
    Civilisation Without
    An *Army.*
  body: |
    The [Greeks] sailed to conquer. The [Romans] sailed to garrison. India sailed to [trade], to [teach], and to [marry]. Across a thousand years and three thousand miles, the [Ramayana] became local, [Sanskrit] became sacred, and [Angkor] became the largest temple on Earth  without one Indian battalion ever crossing the [Bay of Bengal].
