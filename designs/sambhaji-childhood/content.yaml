- layout: split-story
  chapter: Chapter 03 · The Great Escape
  headline: |
    Hidden In A
      Sweet *Basket.*
  body: |
    In [1666], the nine-year-old prince travelled [1,000] kilometres to Agra and stood before Emperor [Aurangzeb]. When father and son were put under house arrest, they escaped hidden inside baskets of sweets carried out past the guards. The road home was too dangerous for a child. Shivaji had to leave Sambhaji behind in [Mathura] for months, hidden with three [Brahmin] brothers.
  body_size: 44
  image: _cache/b94471138bbf9eb2.jpg
