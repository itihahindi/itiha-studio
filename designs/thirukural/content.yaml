- layout: closing
  headline: |
    The Sage Did Not
    Convert. The *Forgery*
    Did.
  body: |
    No [textual] evidence. No [historical] evidence. A [PhD] without a foundation, planned a [film] without a fact, a [conference] without a citation, built on a [missionary's] guess from 1880. The [Kural] still names [Vishnu], still names [Lakshmi]. The forgers must hope no one [reads] it.
