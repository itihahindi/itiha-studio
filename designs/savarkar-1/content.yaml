name: ten-things-about-savarkar
format: instagram-portrait
caption: |
  He met Lenin in London in 1909 and kept the conversation secret for twenty-eight years. He wrote thousands of lines of poetry on the walls of the Cellular Jail with thorns when the British denied him pen and paper. He coined the Marathi word for "director" — _digdarshak_ — that every Hindi film credit still uses. He ended his own life at eighty-three by refusing food and medicine, conscious for twenty-two days. Vinayak Damodar Savarkar was many men, and the textbook version flattens almost all of them.

  This carousel draws on Vikram Sampath's two-volume biography _Savarkar: Echoes from a Forgotten Past_ and _Savarkar: A Contested Legacy_, the most comprehensive archival reconstruction of his life to date. Ten facts: the 1909 meeting with Lenin at India House; the prison-wall poetry composed under threat of whitewash; the Patit Pavan Mandir at Ratnagiri, where Savarkar installed a scavenger-caste priest decades before independence; _The Indian War of Independence of 1857_, secretly republished by both Bhagat Singh and Subhas Chandra Bose; the 1940 meeting at Savarkar Sadan where he told Bose to leave India and raise an army abroad — the conversation that seeded the INA; the "D-class" dangerous-prisoner mark stitched into his Cellular Jail uniform; his published poetry at age twelve; the women's collective he helped form at Nashik; and the Atmarpan by which he chose to end his life in 1966.

  The man the textbook reduces to a footnote was the strategist who briefed Netaji, the linguist who renamed the cinema, and the prisoner who refused to be silenced even when stripped of paper.

  @itiha29 · itiha.info
