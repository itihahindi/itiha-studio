- layout: split-story
  chapter: Chapter 07 · The Real Mission
  headline: |
    Souls, Not
    *Bodies.*
  body: The clinics were never built to heal. They were built to [baptise]. Volunteers reported staff
    secretly performing [last-rites baptisms] on dying Hindus and Muslims who could not consent. The medical
    neglect was not an oversight, it was [theology]. The body was a vehicle for the [soul], and the soul
    belonged to [Rome].
  body_size: 45
