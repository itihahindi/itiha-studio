name: thiruvalluvar-the-fabricated-conversion
format: instagram-portrait
caption: |
  Thiruvalluvar wrote the _Thirukural_ around two thousand years ago. He invoked Vishnu measuring the world as Vamana. He warned that sloth disrespected Lakshmi. He devoted 250 couplets to _kama_ — one of the four Hindu purusharthas. Yet a Catholic conference in New York in 2005 distributed images of the Tamil sage sitting at the feet of St. Thomas, listening to the Gospel. This carousel is the record of how that image was manufactured.

  The fabrication has a clear lineage. In the nineteenth century the missionary Indologist G.U. Pope claimed the _Thirukural_ was an echo of the Sermon on the Mount. In 1969, a Hindu convert to Christianity named M. Deivanayagam published _Was Thiruvalluvar a Christian?_, asserting that the Apostle Thomas had personally converted the sage. The book reinterpreted the Kural's praise of rain as praise of the Holy Ghost. It read the verses honouring renunciates as tributes to Jesus. It claimed the opening three chapters were a coded hymn to the Christian Trinity — Father, Son, and Holy Ghost. Tamil scholars, secular intellectuals, and even Tamil Christian theologians rejected the thesis for what it was: a text without textual evidence. Madras University awarded Deivanayagam a PhD anyway. The dissertation was later cited as "evidence" by Catholic filmmakers when they planned a feature depicting Thiruvalluvar as Thomas's disciple.

  This is the digestion playbook documented by Rajiv Malhotra — and the _Thirukural_ is the most ambitious target it has ever attempted.

  @itiha29 · itiha.info
