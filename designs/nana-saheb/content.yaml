name: nana-saheb-peshwa-the-rise
format: instagram-portrait
caption: |
  In 1758, the saffron flag of the Maratha Empire was planted on the Fort of Attock, on the banks of the Indus. From Cuttack in the east to Attock in the west, the subcontinent answered to one power — and that power was directed from a desk in Pune, by a Peshwa who had taken office at nineteen. Balaji Baji Rao, known to history as Nana Saheb, took the Maratha Empire to its absolute geographical zenith through a combination of administrative reform, diplomatic precision, and a partnership with his cousin Sadashivrao Bhau that ran the empire for two decades.

  This carousel is the story of his rise. He inherited the office in 1740 against the opposition of senior commanders who thought him too young. By 1750, the Sangola Agreement had stripped the royal court at Satara of its administrative power and made Shaniwar Wada in Pune the de facto capital of the subcontinent. In 1752, the Ahmadiyya Treaty made the Marathas the official military protectors of the Mughal Emperor, with the right to collect Chauth and Sardeshmukhi across Punjab, Sindh, and Rajputana. The 1760 victory at Udgir forced the Nizam of Hyderabad to cede Asirgarh, Daulatabad, and territories generating six million rupees annually. Sadashivrao Bhau modernised the army with a Western-style cannon battery under Ibrahim Khan Gardi. By 1758, the empire ruled 250 million people. Then came Panipat — and the empire that had taken three decades to build was broken in a single afternoon. Nana Saheb died five months later on Parvati Hill in Pune, at forty.

  The administrative system he built survived him. It would carry his son Madhavrao I to the Maratha resurrection within a decade. But Nana Saheb himself never recovered from what he lost on a single field, in a single hour.

