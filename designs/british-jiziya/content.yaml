name: the-british-jiziya
format: instagram-portrait
caption: |
  Every year for decades after 1858, the British Government in India extracted £200,000 from a starving, overwhelmingly Hindu and Muslim peasantry to pay the salaries of Anglican clergy and maintain the Bishop of Calcutta's palace. The arrangement had a name in British accounts: the Ecclesiastical Charge. It had a more accurate name in the colonial archive's own critics: the British Jiziya.

  This carousel draws on Reginald Reynolds's _The White Sahibs in India_ and contemporary fiscal critiques of the Raj. The arithmetic is brutal in its clarity. Over the final 35 years of the reported period, £7 million was drained from the Indian treasury to fund the Church of India — an Anglican offshoot serving the ruling class alone. The tax was levied across a population of more than 250 million non-Christian Indians whose average income was £2 per head, while the entire beneficiary class numbered 116,916 Europeans. India's own Christian community, mostly Syrian Christians of Travancore, were excluded — the British state-church declared the Syrian faith "heretical," so even Indian Christians paid for a religion they were not allowed to join. This extraction continued through famines that killed millions; Lord Salisbury wrote in his 1875 minute on fiscal policy that "India must be bled," and the "Lancet" of the tax-gatherer was directed even at the "enfeebled" parts of the population. The charge was one extracted line in a much larger Home Charge drain of £16 million per year.

  The British abolished the Mughal Jiziya in 1858 with great moral fanfare. They replaced it with their own.

