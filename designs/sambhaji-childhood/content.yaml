- layout: split-story
  chapter: Chapter 04 · Forged In Fire
  headline: |
    No Time To Be A Child.
  body: By [fourteen], Sambhaji was already handling the kingdom's affairs. By [sixteen], he was meeting
    foreign envoys on his own  including the [English] visitor [Thomas Niccolls].
  body_size: 45
