name: brahmos-indonesia
brand: vaq-hq
format: instagram-portrait
caption: |
  India and Indonesia sealed a major defense deal in Jakarta. Indonesia will acquire the BrahMos supersonic cruise missile, becoming its third foreign buyer after the Philippines and Vietnam.

  The agreement was one of more than a dozen signed during Prime Minister Narendra Modi's three-day visit. It came a day after China test-launched a long-range ballistic missile. The BrahMos flies at three times the speed of sound and launches from land, ships, submarines and aircraft. President Prabowo Subianto called the visit a "historic milestone." The two sides also agreed to deepen maritime security cooperation along the routes linking the Indian and Pacific oceans.

  Modi addresses Indonesia's Parliament next, then travels to Yogyakarta before flying on to Australia.
