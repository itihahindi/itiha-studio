  chapter: Chapter 01 · After Mumtaz
  headline: |
    An Insatiable
    *Appetite.*
  quote: |
    "The only thing Shahjahan cared for was the search for women to serve his pleasure."
  attribution: Niccolao Manucci · Venetian traveller at the Mughal court
  body: The grief of [Mumtaz Mahal] is the story the marble tells. The court the [Italian] traveller saw
    was something else. [Manucci] served at the Mughal court for decades and recorded what the panegyrists
    did not.
  quote_size: 100
