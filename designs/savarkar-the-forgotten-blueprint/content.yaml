name: savarkar-the-forgotten-blueprint
brand: itiha
format: instagram-portrait
caption: |
  The textbook remembers V.D. Savarkar as an ideologue. His own political blueprint for independent India, published across his writings from Ratnagiri onward, was that of a modern, secular, casteless, scientifically industrialised republic. He demanded absolute equality between all citizens irrespective of caste, creed, race, or religion. He called for merit-based recruitment across government services. He championed the "machine age," the nationalisation of key industries, and the mechanisation of agriculture. He advocated inter-caste marriage, the use of electric crematoriums, and the abolition of untouchability. He believed in a world commonwealth for global peace. And he saw the science of Yoga as India's highest civilisational contribution.

  This carousel documents the modernist blueprint that survives in Savarkar's own political writings. He proposed one-man-one-vote as the foundation of the Indian state. He guaranteed minority safeguards for language, religion, and culture — with the qualification that no minority create a "State within a State." He argued for free and compulsory primary education. He recognised the peasant and the working classes as the chief source of national wealth, and demanded they share in the profits of the industries their labour built. He proposed state cultivation of agriculture using big machines at large scale to end India's food dependence. He put science at the centre of national life to "annihilate superstitions." He described a consolidated, casteless Hindu society open to voluntary inter-caste marriages and rational reform. And he saw all of this fitting inside a broader vision of world commonwealth — global peace and prosperity — with the awakening of Kundalini through Yoga as the highest ideal offered by India to mankind.

  The modernist Savarkar is the one his critics and his hagiographers both routinely forget. The blueprint is in his own words.

