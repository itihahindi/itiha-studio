  chapter: Chapter 04 · The Modern Army
  headline: |
    A Cannon Battery
    Bhau *Built.*
  body: Bhau realised that traditional [light cavalry] could no longer hold permanent northern cities.
    He funded a modernised [infantry] and [artillery wing], and hired [Ibrahim Khan Gardi], a commander
    trained by the [French]  to establish a Western-style [cannon battery]. The Maratha army was transformed
    into the most [modernised] force in India.
