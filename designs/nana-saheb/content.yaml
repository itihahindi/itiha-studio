  chapter: Chapter 07 · Panipat And After
  headline: |
    Three Decades. One
    *Afternoon.*
  body: In late [1760], [Ahmad Shah Abdali] crossed the [Indus] seeking vengeance. [Sadashivrao Bhau]
    was leading the maratha army. Which was under blockaded at [Panipat] for two months and reduced to
    [eating raw grain]. On [14 January 1761], the Marathas marched out and were broken. Nana Saheb lost
    his cousin [Bhau] and his son [Vishwasrao] in a single afternoon. Five months later, he died on [Parvati
    Hill] at the age of [forty].
