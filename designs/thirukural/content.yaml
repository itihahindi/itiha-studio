  chapter: Chapter 05 · The Reinterpretation
  headline: |
    How A Hindu Text
    Becomes A Christian *Gospel.*
  items:
  - number: 1
    headline: Rain becomes the Holy Ghost
    body: The Kural's verses praising [rain] , central to Tamil agricultural and devotional life  are
      reread as praise of the Christian [Holy Ghost].
  - number: 2
    headline: The renunciate becomes Jesus
    body: Verses honouring those who [renounced] the world, a Hindu and Jain ideal of [sannyasa] are claimed
      as tributes to [Jesus Christ].
  - number: 3
    headline: The Trinity hides in chapter one
    body: The Kural's first three chapters are twisted into a coded hymn to the Christian [Trinity],  Father,
      Son, and Holy Ghost.
