name: the-lost-capitals-of-central-java
brand: itiha
format: instagram-portrait
caption: |
  On the border of modern Yogyakarta and Surakarta in Central Java lies the Prambanan valley — a stretch of land where, between the eighth and eleventh centuries, the kings of Java built the largest Hindu temple complex ever raised outside India, alongside the second-largest Buddhist stupa on the island. The two faiths flourished side by side. A short walk separated the towering Shiva temple of Lara-Jongrang from the 240 stupas of Chandi Sevu. Then, around the middle of the tenth century, the entire civilisation moved away. The temples were left to the jungle for a thousand years.

  This carousel reconstructs the Prambanan valley from the historical and archaeological record. Chandi Sevu — the biggest Buddhist sanctuary in Java after Borobudur — consisted of a massive central temple surrounded by 240 smaller temples arranged in perfect geometric squares. Lara-Jongrang, the Hindu complex built to rival it, contained eight main temples inside a wall, surrounded by 156 minor temples. The western row housed the Hindu Trinity: the central and most magnificent temple was dedicated to Shiva, flanked by Vishnu on the north and Brahma on the south. Around the inner balustrade of the great Shiva temple, forty-two intricately carved panels depict the epic story of the Ramayana in continuous relief — the same story the Bali shadow-plays still perform tonight, carved in Javanese stone a thousand years ago. In the middle of the tenth century, Hindu political power abruptly shifted away from Central Java. Historians still debate the cause — a massive volcanic eruption, a deadly epidemic, or a hostile naval fleet. Then came the colonial period. Because a multi-ton stone statue was impossible to smuggle out of the jungle, Dutch and British looters chiseled off the heads and hands — light, detailed, easy to ship. Many ended up in European garden estates and Western museum cases, separated by an ocean from the bodies they had once completed.

  The valley is one of the great architectural wonders of the ancient world. Half of its faces are still missing.

