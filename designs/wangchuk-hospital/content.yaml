caption: |
  DEVELOPING — On the 21st day of his indefinite hunger strike, Delhi Police
  shifted activist Sonam Wangchuk from Jantar Mantar to hospital on July 18,
  triggering chaotic scenes as supporters tried to block the move. The protest
  site remained active after he was taken away.

  Concerns about force-feeding have been raised by supporters and are not
  independently confirmed.

  Source: The Tribune.

