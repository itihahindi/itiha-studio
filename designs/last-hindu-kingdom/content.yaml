name: raja-humabon-the-forgotten-hindu-king
format: instagram-portrait
caption: |
  When Ferdinand Magellan's fleet dropped anchor at Cebu in March 1521, the Portuguese explorer did not encounter an isolated island of animist tribes. He encountered a Hindu monarch — Raja Humabon — ruling a kingdom whose royal family historical evidence suggests was possibly of Tamil origin. The Philippines that Magellan "discovered" was the eastern frontier of a maritime civilisation that had reached from the Coromandel Coast across the Indian Ocean and into the archipelagos of Southeast Asia for over a thousand years.

  This carousel reconstructs the encounter and its consequences. Magellan reached Cebu in March 1521 after a grueling voyage around South America. He negotiated a treaty with Raja Humabon, who agreed to be baptised and converted to Catholicism as part of the alliance. Humabon likely viewed the conversion as a strategic political manoeuvre. In practice, it became the exact legal and historical basis on which Spain would later claim sovereignty over the entire Philippine archipelago. When Humabon's vassal chief Lapulapu refused to submit to the Spanish, Magellan felt obliged to prove European military superiority and personally led an assault on Lapulapu's island. He was surrounded and killed on the beach. The Spanish fleet fled. Humabon's fateful conversion had brought foreign conflict to his shores, cost his ally his life, and laid the groundwork for the eventual Spanish colonisation of the Philippines. Lapulapu is remembered today as a national hero. Humabon is largely forgotten.

  The story of Raja Humabon is a footnote in the history of European exploration. It is a chapter in the history of Indianised Southeast Asia — and of the moment when that civilisational reach met the sword of the Iberian empires.

