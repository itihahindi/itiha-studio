  chapter: Chapter 03 · The Two Pearls
  headline: |
    Brothers, Not
    *Cousins.*
  body: 'Behind the empire''s success lay the partnership of Nana Saheb and his cousin [Sadashivrao Bhau]
    . the son of [Chimaji Appa], orphaned young and raised by Nana Saheb''s mother [Radhabhai] alongside
    Nana Saheb himself. The Peshwa was the [public face]:  the diplomat. Bhau was the [internal engine].
    the auditor,  General, the financier, the [administrative mind] of the empire. '
