name: the-two-thousand-year-playbook-against-murugan
brand: itiha
format: instagram-portrait
caption: |
  There is an ancient script for demoting a god. It was written in Greece around 300 BCE. It was weaponised by the early Christian empires against the pagans of Rome. It was carried by monks into medieval Europe. It crossed the Atlantic with Spanish missionaries and dismantled the theology of the Aztecs and Incas. Today it reaches Tamil Nadu — where a coordinated push seeks to reclassify the Hindu deity Murugan as merely "an ancestor of the Tamils." This is not a modern secular awakening. It is the same theological weapon, applied to a new target.

  The script has a name: Euhemerism. In 300 BCE, the Greek writer Euhemerus proposed that the gods of Olympus had never been divine — they had been mortal kings whose deeds were exaggerated by grateful or terrified subjects until they were worshipped as gods. The pagans hated it. Early Christian writers weaponised it, dismissing Jupiter and Saturn as ancient human ancestors and stripping their divinity while conceding their historical existence. Medieval monks preserved beloved local folklore by using the same loophole — Snorri Sturluson rewrote Thor and Odin as a lineage of mortal kings from Troy, saving the Norse pantheon from erasure by demoting it into historical literature. Spanish friars in the Americas dismissed Inca sun-worship as a political tool invented by human rulers for social control, and reclassified the Aztec feathered-serpent Quetzalcoatl as a mortal man — some even claiming he was secretly a Christian missionary. In every case, the technique is identical: concede the historical existence, remove the divinity, reduce the god to an ancestor. The rest follows on its own.

  When Murugan is reclassified from a divine figure to a Tamil ancestor, his divine authority is stripped and his indigenous culture is seamlessly appropriated. The vocabulary is modern. The technique is two thousand years old.

  @itiha29 · itiha.info
