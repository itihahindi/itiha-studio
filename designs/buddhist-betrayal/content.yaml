    Surrender did not preserve the city's [sanctity]. Despite their cooperation, [Qasim] followed a policy of [iconoclasm] in [Nerun]. [Idols] were broken. [Mosques] were founded upon the [ruins] of the existing [temples]. The [priests] who had opened the gates watched them close on their own [places of worship].
