- layout: did-you-know
  eyebrow: Did You Know?
  headline: |
    The Ramayana In
    *42 Panels.*
  body: |
    The art of [Lara-Jongrang] is famous for being [dramatic and dynamic] — filled with human life, activity, and passion. Walk around the inner balustrade of the great [Shiva temple] and you will find a continuous series of [42 intricately carved panels] depicting the epic story of the [Ramayana]. The same story the [Bali] shadow-plays still perform tonight — carved in [Javanese stone] a thousand years ago.
  source: Historical and archaeological records of the Prambanan complex
- layout: story
  chapter: Chapter 04 · The Abandonment
  headline: |
    A Civilisation
    Simply *Left.*
  body: Around the middle of the [tenth century AD], [Hindu culture] and [political power] abruptly shifted
    away from [Central Java]. Historians still debate the exact cause — was it a massive [volcanic eruption],
    a deadly [epidemic], or the ravages of a hostile [naval fleet]? Whatever the cause, these masterpieces
    fell into [ruin] — waiting [centuries] to be rediscovered under the [jungle].
- layout: did-you-know
  eyebrow: The Colonial Theft
  theme: light
  headline: |
    They Chiseled Off
    The *Faces.*
  body: |
    During the [Dutch] and [British] colonial periods, there was a massive European market for [exotic antiquities]. It was incredibly difficult to transport a whole, multi-ton [stone statue] out of the jungle — so looters used [chisels] to cleanly saw off the [heads] and [hands], which were [lightweight], [highly detailed], and easy to [smuggle]. Many of these decapitated heads ended up in [private European estates] as [garden ornaments], or inside [Western museums].
  source: Contemporary colonial-era antiquities records
- layout: closing
  headline: |
    Half The Faces
    Are Still *Missing.*
  body: |
    The [Prambanan valley] is one of the great architectural wonders of the [ancient world]. The [temples] were left to the [jungle] for a thousand years. When they were [rediscovered], the [colonisers] took what would fit in a [crate]. The [bodies] remained in [Java]. The [faces] went [abroad]. The valley waits, still, to be made [whole].
