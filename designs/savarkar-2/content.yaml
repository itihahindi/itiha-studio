    Sailed For *Burma.*
  body: '[Rash Behari Bose] orchestrated the most ambitious attempt of all,  an [armed ship] dispatched
    to attack the Andamans, liberate the political prisoners, and transport them to [Burma]. The mission
    was intercepted at sea. The ship was sunk by the British heavy cruiser [HMS Cornwall]. A daring objective.
    A devastating end.'
