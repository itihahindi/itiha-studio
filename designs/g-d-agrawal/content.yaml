- layout: split-story
  chapter: Chapter 02 · The Demand
  headline: |
    Let The River
    Flow *Free.*
  body: He demanded that the [government] halt [destructive hydroelectric projects] and let the [river's
    upper streams] flow [free] and [clean]. The [Ganga], he argued, was not a [resource] to be [fragmented]
    into dam reservoirs before it left the [Himalayas], it was a [living being] with a [right] to its
    own [flow].
  image: https://static.toiimg.com/thumb/111502165/111502165.jpg?height=746&width=420&resizemode=76&imgsize=96052
  image_position: 54% 100%
  image_overlay: 0.8
  body_y: 12
- layout: split-story
  chapter: Chapter 03 · The Fast
  headline: |
    A Fast
    *Unto Death.*
  body: In the summer of [2018], after his pleas to politicians went completely [ignored], he initiated
    a brutal [fast unto death]. The days turned into [weeks], and the weeks into [months]. By the time
    he crossed the [100-day mark], he was surviving on sheer [willpower]. Eventually, he refused even
    a single drop of [water].
  image: https://static.sanatanprabhat.org/wp-content/uploads/sites/7/2026/05/06144530/River_Ganga_purity.jpg
  image_overlay: 1
  headline_size: 100
  body_y: 26
- layout: document
  eyebrow: 11 October 2018
  theme: dark
  headline: |
    Day One Hundred
    And *Eleven.*
  source: Contemporary press reports and official records
  body_y: 30
  quote: |
    On 11 October 2018, his 111th day without food, his body finally gave out. He was 86 years old. He had spent his final months writing to the Prime Minister and successive ministers. Not a single reply arrived in time to save the river he was dying for.
  image: screenshot-2026-07-16-at-9-43-04-pm.png
- layout: closing
  headline: |
    He Gave His Life.
    The River Kept
    *Dying.*
  body: |
    There was no [global outcry]. No [systemic overhaul]. No [sudden awakening]. [G.D. Agrawal] sacrificed his life for the [Ganges], and the world simply [scrolled past], [shrugged], and [moved on]. The [dams] he opposed still [rise]. The [headwaters] he demanded be [free] still [fragment]. The [record] of his [111 days] is what remains, and what asks the [question] his death did not [answer].
