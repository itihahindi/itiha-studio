- layout: story
  chapter: Chapter 08 · The Anointed One
  headline: |
    The West Came
    To *Save* Us.
  body: Teresa placed herself on the pedestal of an [anointed one] , qualified by [Europe] to prescribe
    what poor countries needed. She did not preserve the [cultural] dignity of those she served. She [westernised]
    them. She [Catholicised] them. The civilisation she found in [Bengal] was, to her, the [problem].
  body_size: 48
