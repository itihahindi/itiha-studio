    In [1752], Nana Saheb's diplomats executed the [Treaty]. The Marathas became the official [military protectors] of the [Mughal Emperor]. In exchange, they won the right to collect [Chauth] and [Sardeshmukhi] across muhgal provinces. The [Mughal Emperor] became a well-kept prisoner of [Maratha foreign policy].
