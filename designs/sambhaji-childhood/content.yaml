name: sambhaji-childhood
format: instagram-portrait
caption: |
  History remembers Sambhaji Maharaj as a warrior and a martyr. It rarely remembers the child.

  Motherless at two. A Mughal hostage at eight. Hidden in a sweetmeat basket at nine. A 5-part series on the childhood that forged a Chhatrapati.

  @itiha29 · itiha.info

