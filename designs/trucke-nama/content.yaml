- layout: split-story
  chapter: Chapter 04 · The Engagement Strategy
  headline: |
    False Equivalence
    As A *Brand.*
  body: 'Beyond the academic journal, Truschke engagment farms on [social media] platform built on provocation,
    that Islamic iconoclasm was no different from the [Hindu kings] who, she claims, [looted] and [defiled]
    each other''s temples. Scholar [Girish Shahane] dismantled the thesis: it rested on a [fictive incident]
    created by misunderstanding a bit of verse. When Hindu kings took deities as war trophies, they [preserved]
    and [reconsecrated] them. Islamic iconoclasm aimed to [terminate] idolatry. The two practices are
    [opposites]. The [false equivalence] is repeated daily, calibrated for the [outrage] '
  headline_size: 80
  body_size: 42
  body_y: 67
  headline_y: 21
- layout: split-story
  chapter: Chapter 05 · The Mistranslation
  headline: |
    Sita Called Rama
    A *Misogynist Pig.*
  body: In [2018], Truschke publicly claimed that during the [agnipariksha] episode in [Valmiki's Ramayana],
    Sita addressed Lord Rama as a [misogynist pig and uncouth]. She attributed the vulgar translation
    to the work of [Robert Goldman], the [University of California, Berkeley] Sanskritist who heads the
    definitive English Ramayana translation project. The Indian internet erupted. So did Goldman himself.
  headline_size: 80
  body_size: 42
  image_position: 27% 50%
- layout: split-story
  chapter: Chapter 07 · The Aftermath
  headline: |
    She Did Not Retract.
    She Played The *Victim.*
  body: Despite the unambiguous repudiation from the very scholar she had cited, Truschke [never withdrew]
    the statement, never corrected the record, and never apologised. Instead, she compared the [backlash]
    she received from Hindus to the [plight of Sita] herself , a comparison Mukhopadhyay and Sastry note
    is as [absurd] as it is [revealing].
  headline_size: 80
  body_size: 45
