    Million A *Year.*
  body: At the [Battle of Udgir] in [1760], Bhau trapped the [Nizam's] army. Nana Saheb leveraged the
    victory into a [devastating diplomatic surrender], the Nizam ceded the historic forts of [Asirgarh]
    and [Daulatabad], along with territories generating [six million rupees] in annual revenue. The Deccan
    was [secured] without a massacre. Peshwa Become master of Deccan
