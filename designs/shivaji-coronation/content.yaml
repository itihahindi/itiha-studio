- layout: split-story
  chapter: Chapter 02 · The English Arrive
  headline: |
    The Company Sent
    Its *Diplomats.*
  body: The [East India Company], eager to finalise a treaty for reparations over its [Rajapur] factory,
    sent a delegation of three, [Henry Oxenden], [George Robinson], & [Thomas Mitchell]. They reached
    the foot of [Raigad] on [19 May 1674]. Shivaji was at [Pratapgad], dedicating a pure gold sombrero
    weighing [1.25 maunds] at the shrine of [Goddess Bhavani]. The Company would wait.
  headline_size: 75
