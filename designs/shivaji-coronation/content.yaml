- layout: quote
  chapter: Chapter 05 · The English Witness
  headline: |
    What Oxenden
    *Saw.*
  quote: |
    Seated on a magnificent throne,
    surrounded by nobles in exceedingly rich attire —
    two great fish heads of gold,
    horses' tails, and an equally poised
    pair of gold scales representing justice.
  attribution: Henry Oxenden, English East India Company envoy — diary entry, 6 June 1674
