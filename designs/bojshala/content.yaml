  chapter: Chapter 04 · The First Muslim Record
  headline: |
    The Earliest Arabic
    Inscription Is From *1392.*
  body: |
    Every Sanskrit and Prakrit inscription at the site predates every Arabic and Persian one. The oldest Islamic inscription at Bhojshala records [repairs] under [Dilawar Khan] — dated [1392–93 CE].
    The temple inscriptions are older by more than [three hundred] years. The mosque elements.
