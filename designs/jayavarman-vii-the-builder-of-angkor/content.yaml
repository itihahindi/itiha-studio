name: jayavarman-vii-the-indian-inheritance
brand: itiha
format: instagram-portrait
caption: |
  When the Khmer king Jayavarman VII took the throne in 1181, his kingdom had just been nearly destroyed by a Cham invasion. Over the next thirty-seven years, he launched an architectural programme on a scale never seen before in Southeast Asia — a rebuilding that was, in his own inscriptions, a restoration of Indian civilisational inheritance. He kept the Vedas at the heart of his court. He appointed Indian Brahmins as his chief priests. He built 102 hospitals across his kingdom. And he crowned his capital with a temple whose towers, carved with his own face as the Bodhisattva Lokeshvara, look outward in all four directions.

  This carousel reconstructs Jayavarman VII's programme as an act of civilisational continuity, not innovation. His new capital Angkor Thom was designed as a miniature universe, with the Bayon at its geometric centre as a temple-mountain representing the axis of the world. He honoured his mother at Ta Prohm as Prajnaparamita — the Perfection of Insight — and his father at Preah Khan as the Bodhisattva of Compassion, following the Indian tradition of ancestral deification. He built 121 rest houses along the highways for travellers and pilgrims. He invited Brahmin scholars from India — including the priest Hrishikesha — and made them his chief priests, ensuring that the Vedas and other ancient Indian sciences remained at the core of Khmer life. His reign was marked by a syncretism the modern world has forgotten how to imagine — Buddhist devotion to Lokeshvara alongside Brahmin ritual at court, without conflict, without either tradition demanding the other's suppression.

  Jayavarman VII did not build an original civilisation. He built the peak of an inherited one — and the stones that survive at Angkor are the evidence of how far the Indian inheritance had reached, and how completely it had taken root.

  @itiha29 · itiha.info
