- layout: story
  headline: |
    A Bomb Factory
    Inside *Kala Pani?*
  body: |
    British authorities were so convinced of Savarkar's reach that they came to believe a [clandestine bomb factory] was operating inside the [Cellular Jail] settlement itself. No factory was ever found. The fear was the point, the colonial state could not believe that locking the man on an island had actually [contained] him.

    Source: Vikram Sampath, Savarkar: Echoes from a Forgotten Past
