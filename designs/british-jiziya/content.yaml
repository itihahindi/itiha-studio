    A Tax  For
    *Church of India*
  body: In the official ledgers of the [British Indian] administration, after the [1858] transition from
    Company to Crown, one line ran every year, the [Ecclesiastical Charge]. It funded the [Church of India],
    the [Anglican] offshoot that served as the [state church] of the Raj. Every [rupee] of it was extracted
    from a [non-Christian] peasantry. Every [pound] of it left India.
