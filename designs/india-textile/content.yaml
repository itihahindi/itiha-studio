    sublabel: A 28% collapse in seventeen years
  body: The country that had clothed [Europe] and [Africa] in the seventeenth century could no longer
    clothe itself in the twentieth. The decline was not from war or famine. It was from [policy].
- layout: closing
  headline: |
    Free Trade Was
    Never *Free.*
  body: |
    The looms of [Bengal] were not outcompeted. They were [legislated] out of existence — by [tariff] in London, by [excise] in Calcutta, by [bayonet] in the weaver's village.
