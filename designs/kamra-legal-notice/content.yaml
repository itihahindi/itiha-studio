name: kamra-legal-notice
brand: vaq-hq
format: instagram-portrait
caption: |
  Nine words at Jantar Mantar.

  On July 15, Kunal Kamra told a protest crowd that the government takes "Sita ke pati ka
  naam" and does "Nita ke pati ka kaam." Sita's husband is Lord Ram. Nita's husband is
  Mukesh Ambani. His charge was blunt. Leaders invoke religion in public and serve
  corporate interests in practice.

  He said it at the sit-in over the NEET-UG paper leak, the same protest where Sonam
  Wangchuk is deep into a hunger strike. The clip went viral within hours. An advocate
  has since demanded that Kamra delete the video within 48 hours, post an unconditional
  apology on X, and undertake never to repeat it. The alternative on offer is a police
  complaint under the Bharatiya Nyaya Sanhita for outraging religious feelings.

  Kamra has stood here before. The Supreme Court opened contempt proceedings over his
  posts. A Maharashtra privilege committee summoned him over an Eknath Shinde jibe. He
  declined to apologise both times, arguing that an insincere apology sets the worse
  precedent. Where satire ends and religious sentiment begins is now a question for the
  police.

  @vaqhq · vaqhq.com
