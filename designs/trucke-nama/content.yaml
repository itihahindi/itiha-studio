    body: 'She accused the Supreme Court verdict of "Hindutva rewriting" while ignoring the [Archaeological
      Survey of India''s 2003] findings of [temple pillars] beneath the Babri site. '
  - number: 2
    headline: The Upanishads are "not Hindu scripture"
    body: She asserts that the [Upanishads], [Puranas], [Ramayana], and [Mahabharata] are not Hindu scriptures,
      ignoring the foundational concept of [prasthanatrayi] that has anchored Vedanta for centuries.
  - number: 3
    headline: The Aryan migration is "ironclad"
    body: Against accumulating [archaeological], [genetic], and [hydrological] evidence against the colonial-era
      Aryan Migration Theory, Truschke labels it an [ironclad] scholarly consensus
