name: breaking-india
brand: itiha
format: instagram-portrait
caption: |
  In 2011, Rajiv Malhotra and Aravindan Neelakandan published a book with a blunt title — Breaking India.

  Its argument: a network of Western governments, evangelical churches, and academic institutions is engineering separatist identities inside India to fracture its civilisational unity.

  A 9-part read on the thesis, the players, and the inheritance of colonial race science.

  @itiha29 · itiha.info

  #IndianHistory #BreakingIndia #Itiha
