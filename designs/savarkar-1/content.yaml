    During his years at [India House] in London, Savarkar held a historic meeting with [Vladimir Lenin] in [mid-March 1909]. What passed between the two revolutionaries remained sealed for [twenty-eight years] — Savarkar did not disclose the details of the conversation until [1937].

    Source: Vikram Sampath, Savarkar: Echoes from a Forgotten Past
