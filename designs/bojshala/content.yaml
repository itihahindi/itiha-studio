name: bhojshala-inscriptions
format: instagram-portrait
caption: |
  Long before the dispute, before the courts, before the cameras — there were the stones.

  Four inscriptions, carved between 1034 and 1215 CE, name the site at Dhar as a temple of Sarasvati. They were published by the Archaeological Survey of India decades before the modern controversy began.

  A 6-part series on what the stones themselves say.

  @itiha29 · itiha.info

  #IndianHistory #Bhojshala #Dhar #Itiha
