  chapter: Chapter 03 · The Pillar Grammars
  headline: |
    The Alphabet
    Carved Into *Stone.*
  body: |
    Two pillars still standing inside the Bhojshala hall are inscribed in the shape of serpents. One carries the full [Sanskrit] alphabet and grammatical endings. The other lists the declensions of tenses and moods.
    The colophons name the Paramara kings [Udayaditya] and [Naravarman] — Bhoja's successors & call the inscriptions the "unique magical sword" for preserving language. The site was a working [śālā], a school of Sanskrit. One of these pillars stands beside the [minbar].
  body_size: 42
  headline_size: 100
