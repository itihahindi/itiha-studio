- layout: closing
  body: |2

    The childhood of [Sambhaji Maharaj] was not lost to circumstance. It was [spent] — deliberately, painfully — to forge a successor capable of holding a kingdom that the empires of the age had vowed to destroy. What history calls a [warrior-king], the boy paid for in advance.
