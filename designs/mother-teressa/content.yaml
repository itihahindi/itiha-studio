  headline: |
    The Donations Went
    To The *Vatican Bank.*
  body: |
    Funds [earmarked] by donors for charitable work in [Calcutta] were routinely transferred to the [Vatican Bank] for general use. Teresa never disclosed her order's finances beyond what the law required. The [Missionaries of Charity] received an estimated [hundreds of millions], almost none of it traceable to the clinics.
