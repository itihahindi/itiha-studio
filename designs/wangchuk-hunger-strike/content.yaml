  label: Sat the NEET-UG
  value: 22 LAKH
  stat_size: 190
  sublabel: The exam was later cancelled
  body: May's paper leaks hit one of India's largest examinations — and detonated a [student revolt] the
    government has not contained.
- layout: story
  kicker_meta: The Demand
  headline: 'One Ask: The *Minister* Goes'
  body: |
    The protest wants Education Minister [Dharmendra Pradhan] to resign over the leaks. The sit-in is run by the [Cockroach Janta Party] — a Gen Z outfit that has camped at Jantar Mantar for weeks.
- layout: quote
  kicker_meta: Delhi High Court
  quote: Every life is precious.
  attribution: Delhi High Court, ordering daily medical monitoring
- layout: story
  kicker_meta: What's Next
  headline: A March On *Parliament*
  body: |
    On day 18 Wangchuk said his readings were _"quite normal for an 18-day fast."_ The court has put government doctors on watch. A march to [Parliament] is called for [July 20].
- layout: closing
  headline: A fast the state cannot ignore.
  body: Nineteen days, one demand, and a movement the government did not see coming. Follow [Vaq HQ] for
