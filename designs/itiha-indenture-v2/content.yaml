    sublabel: Stipends from Rs. 50 to several thousand
    value_red: true
  body: By Goel's estimate, [twenty crore rupees] a year flowed from [Moscow] into the CPI apparatus.
    The money paid [seventy thousand wholetimers], subsidised papers like the _Blitz_, financed festivals
    and foreign delegations, and where persuasion failed, bought off writers, poets, and journalists outright.
  image_bw: true
