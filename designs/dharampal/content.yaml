  chapter: Chapter 02 · The Steel
  headline: |
    Wootz Beat
    *Sheffield.*
  body: 'By the eighteenth century, India operated an estimated [10,000] iron and steel furnaces. They
    produced [wootz], a crucible steel that British metallurgists, on examination, admitted was [decidedly
    superior] to the best [Sheffield] steel for fine cutlery and surgical blades. The Indian smelter converted
    iron to cast steel in [2.5 hours]. The British process took [4]. '
  body_size: 45
  body_y: 86
