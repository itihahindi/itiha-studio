- layout: quote
  chapter: Chapter 01 · The Yellow Mark
  headline: |
    Marked
    For The *Slaughter.*
  quote: |
    "The Pakistani Army has painted big yellow 'H's' on the Hindu shops still standing in this town to identify the property of the minority eighth of the population that it has made its special targets."
  attribution: Sydney H. Schanberg · The New York Times · [Faridpur], 29 June 1971
  body: In [Faridpur], the [Pakistani Army] painted the letter on doorways before the men with guns arrived.
    The [Hindu] eighth of the population had been pre-selected for destruction.
  body_size: 35
  texture: halftone
  headline_offset_y: -70
  body_offset_y: 30
- layout: quote
  chapter: Chapter 02 · Village By Village
  headline: |
    A Hunt,
    Not A *War.*
  quote: |
    "The campaign against the Hindus was  and in some cases still is systematic. Soldiers fanned through virtually every village asking where the Hindus lived."
  attribution: Sydney H. Schanberg · The New York Times · [Faridpur], 29 June 1971
  body: This was not the chaos of war. It was an [administrative] operation. [Hindu] properties were confiscated
    and handed to **loyal** citizens , A transfer of wealth executed at gunpoint.
  body_size: 40
  theme: dark
  texture: halftone
  body_offset_y: 40
- layout: quote
  chapter: Chapter 03 · The Public Square
  headline: |
    Beheaded
    In *Faridpur.*
  quote: |
    "In April, as a public example, two Hindus were beheaded in a central square in Faridpur and their bodies were soaked in kerosene and burned. When some Hindus, trying to save their lives, begged to convert to Islam, they were shot as unworthy nonbelievers."
  attribution: Sydney H. Schanberg · The New York Times · [Faridpur], 29 June 1971
  body: Terror was the method. In [April 1971], the central square of Faridpur became a stage. Even [conversion]
    was refused — the killings were not about faith, they were about extermination.
  body_size: 35
  body_offset_y: 120
  texture: halftone
- layout: quote
  chapter: Chapter 04 · Bodidangi
  headline: |
    Three Hundred
    At *Bodidangi.*
  quote: |
    "Reliable local reports say, as many as 300 Hindus were massacred. Two soldiers beat her, ripped off her jewelry, fired a shot at point-blank range into her neck and left her for dead."
  attribution: Sydney H. Schanberg · The New York Times · [Bodidangi], 29 June 1971
  body: The village of [Bodidangi] had been a refuge. [Three hundred] Hindus were killed there. A [seventy]-year-old
    woman survived a bullet to the neck and lived to testify.
  body_size: 35
  headline_offset_y: 50
  body_offset_y: 90
  texture: halftone
- layout: quote
  chapter: Chapter 05 · The Camps
  headline: |
    What Reached
    *Calcutta.*
  quote: |
    "Soldiers picked six of our boys, tied their hands behind their backs and made them stand in a line. Then they mowed them down with their guns. The soldiers first raped her in front of her husband and then killed him."
  attribution: Khushwant Singh · refugee testimony · [Calcutta] border, 1971
  body: Four months into the war, the refugee camps near [Calcutta] held the witnesses. [Six] boys mown
    down in a line. A husband murdered after his wife's rape. The reports were not rumour — they were
    filed by named journalists in named newspapers.
  body_size: 30
  image_bw: false
  body_offset_y: 50
  texture: halftone
- layout: closing
  headline: |
    The Record
    Was *Printed.*
  body: |
    The [New York Times] carried the dispatches. [Sydney Schanberg] filed from Faridpur. [Khushwant Singh] filed from the border. The genocide of [1971] is not a matter of memory. It is a matter of record. yet,  It is missing from discourse of our country.
