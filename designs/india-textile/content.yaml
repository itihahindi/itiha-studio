- layout: did-you-know
  eyebrow: Did You Know?
  theme: light
  headline: |
    The Weaver Signed
    At *Gunpoint.*
  body: |
    In [1772], East India Company agents forced Bengal weavers, under [armed guard], to sign contracts agreeing to deliver cloth at prices fixed [15% to 40%] below the open market. Refusal meant imprisonment. The Company was not buying cloth. It was confiscating labour.
  source: R.C. Dutt, Economic History of India
- layout: timeline
  chapter: Chapter 05 · The Mills Strike Back
  headline: |
    And Then India
    Built *Its Own.*
  items:
  - date: 1854
    headline: The first mill at Bombay
    body: Cowasji Davar's mill opens. Indian capital, Indian labour, mechanised production.
  - date: 1877
    headline: 1.23 million spindles
    body: By March, an estimated [1,231,284] spindles were turning in Indian mills. Lancashire took notice.
  - date: 1894
    headline: The tariff is cut to 3.5%
    body: To please [Scottish] and [Lancashire] mill-owners, import duties on British cloth are slashed.
  - date: 1896
    headline: The countervailing excise
    body: A matching [3.5%] excise duty is placed on every yard Indian mills produce. Domestic advantage
      — erased.
