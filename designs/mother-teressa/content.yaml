name: mother-teresa-the-fraud
format: instagram-portrait
caption: |
  She was canonised in 2016. The evidence assembled by her own volunteers, her own financial trail, and her own recorded words tells a different story. Mother Teresa was not the saint of Calcutta. She was the Church's most effective publicist — a woman who turned the suffering of the Indian poor into a global fundraising apparatus, and the donations into Vatican Bank deposits.

  This carousel draws on Christopher Hitchens' _The Missionary Position_, the investigative reporting of Aroup Chatterjee in _Mother Teresa: The Untold Story_, and contemporaneous accounts from volunteers at the Missionaries of Charity clinics. The pattern is consistent. Teresa took $1.25 million from convicted fraudster Charles Keating and refused to return it after his conviction. She laid a wreath on the tomb of Albanian communist dictator Enver Hoxha, who had outlawed religion. She kept her order's finances hidden from public scrutiny. Her dying patients received reused needles and aspirin while she was treated at the finest clinics in California and Rome. She called AIDS "just retribution for improper sexual conduct" at a 1989 WHO ceremony. She praised the suffering of the poor as "beautiful" while travelling the world to collect awards. Her 500 convents all bear her order's name. The clinics were never about healing — they were about saving souls for Rome, and Indians were the raw material.

  This is not an attack on faith. It is a record of what was done in its name, on Indian soil, with Indian poverty as the backdrop.

  @itiha29 · itiha.info
