  chapter: Chapter 01 · The Foundation Date
  headline: |
    Murthi of goddess Installed
    In *1034.*
  body: |
    A sculpture recovered from the ruins of Dhar's city palace in [1875] carries its own dated inscription. It records that a lady named [Sosā] "having first installed _Vāgdevī_ the Mother, and subsequently a triad of Jinas, created this auspicious image."
    The date corresponds to [Samvat 1090] — [1034–35 CE]  the reign of King [Bhoja]. _Vāgdevī_ is another name for [Sarasvati]. The sculpture is today in the **British Museum**.
  body_size: 40
  headline_size: 75
