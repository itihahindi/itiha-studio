name: how-britain-killed-indian-cotton
format: instagram-portrait
caption: |
  Before the East India Company arrived, India clothed the world. By the time the British left, Indians could not afford to clothe themselves. The destruction of the world's largest textile industry was not an accident of industrialisation — it was engineered, line by line, in tariff schedules and excise duties.

  This carousel draws on R.C. Dutt's _Economic History of India_ and the tariff records of the East India Company to lay out the mechanics. Between 1797 and 1813, British duties on Indian calicoes entering London rose from 18% to 85%. Inside India, British cloth paid a nominal 2.5% duty while Indian cloth was crushed by a cumulative 17.5% inland tax. British cotton exports to India climbed from £156 in 1794 to over £16 million by 1876. In 1772, Company weavers were forced under armed guard to sign contracts at 15–40% below market rates. By 1896, when Indian mills finally rose, Lancashire forced a 3.5% countervailing excise on every yard they wove. The endpoint was measurable: Indian per-capita cotton consumption fell from 13.25 yards in 1914 to 9.5 yards by 1931.

  This was not free trade. It was a closed circuit, designed in Manchester and enforced in Madras.

